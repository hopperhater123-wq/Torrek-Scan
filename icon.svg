<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Torrek Scan">
  <rect width="512" height="512" fill="#14120F"/>
  <!-- Barcode im sicheren Bereich (zentrale ~70%) für Maskable-Icons -->
  <g fill="#FBF9F5">
    <rect x="150" y="150" width="14" height="212" rx="2"/>
    <rect x="176" y="150" width="8"  height="212" rx="2"/>
    <rect x="196" y="150" width="20" height="212" rx="2"/>
    <rect x="228" y="150" width="8"  height="212" rx="2"/>
    <rect x="248" y="150" width="12" height="212" rx="2"/>
    <rect x="298" y="150" width="8"  height="212" rx="2"/>
    <rect x="318" y="150" width="16" height="212" rx="2"/>
    <rect x="346" y="150" width="8"  height="212" rx="2"/>
    <rect x="362" y="150" width="14" height="212" rx="2"/>
  </g>
  <!-- Ein Bernstein-Balken als Akzent -->
  <rect x="272" y="150" width="18" height="212" rx="2" fill="#E8A33D"/>
  <!-- Scanlinie -->
  <rect x="128" y="249" width="256" height="14" rx="7" fill="#E2574C"/>
