# GitHub-Pages-Deploy für das EIGENE torrek-scan-Repo.
# Inaktiv, solange dieser Ordner Teil von checkdrytrack ist (Actions lesen nur
# Workflows im Repo-Wurzelverzeichnis). Sobald torrek-scan ein eigenes Repo ist
# (Ordnerinhalt = Repo-Wurzel), deployt dieser Workflow die Seite bei jedem Push.
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
