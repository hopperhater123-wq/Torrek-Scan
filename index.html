<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090B0D">
<meta name="apple-mobile-web-app-title" content="Torrek Scan">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Torrek Scan</title>
<style>
/* ═══════════════════════════════════════════════════════════
   TORREK SCAN — Field System · Inszenierung
   Acid/Cyan auf Tinte, Raster, Mono. Dazu jetzt: Vorhang-Intro,
   choreografierte Screenwechsel (nur beim Wechsel, nie beim
   Tippen), Masken-Titel, Parallax-Wasserzeichen.
   Alles transform/opacity/clip-path. Eine Hand, Handschuh, Keller.
   ═══════════════════════════════════════════════════════════ */

:root{
  --ink:#090B0D; --panel:#11161A; --panel2:#171E23;
  --line:rgba(232,244,239,.14); --line2:rgba(232,244,239,.28);
  --paper:#F3F6F1; --muted:#8D9994; --dim:#53605B;
  --acid:#BCFF55; --cyan:#71E4DF; --orange:#FF7148; --rot:#E2574C;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  --federn:cubic-bezier(.34,1.3,.5,1);
  --weich:cubic-bezier(.2,.8,.2,1);
  --buehne:cubic-bezier(.7,0,.16,1);       /* Vorhang: schwer anlaufend, satt endend */
}
:root[data-theme="light"]{
  --ink:#EFF1EC; --panel:#FFFFFF; --panel2:#FFFFFF;
  --line:rgba(9,11,13,.13); --line2:rgba(9,11,13,.26);
  --paper:#0D1013; --muted:#5F6B66; --dim:#98A29D;
  --acid:#5E9B12; --cyan:#0E7C86;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--ink)}
body{
  min-height:100dvh;min-width:320px;overflow-x:hidden;color:var(--paper);
  font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;
  background:
    radial-gradient(70rem 40rem at 74% -15%,rgba(113,228,223,.12),transparent 52%),
    radial-gradient(45rem 30rem at 0 100%,rgba(188,255,85,.08),transparent 60%),
    var(--ink);
  background-attachment:fixed;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.28;
  mix-blend-mode:screen;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.22'/%3E%3C/svg%3E")}
:root[data-theme="light"] body::before{mix-blend-mode:multiply;opacity:.14}

/* ── Parallax-Ebenen: wandern gegenläufig zum Scroll ─────── */
#glow{position:fixed;inset:-20% -10%;z-index:0;pointer-events:none;will-change:transform;
  background:radial-gradient(34rem 24rem at 82% 30%,rgba(113,228,223,.1),transparent 62%),
    radial-gradient(28rem 20rem at 6% 86%,rgba(188,255,85,.07),transparent 60%)}
#wz{position:fixed;top:9%;right:-14px;z-index:0;pointer-events:none;will-change:transform;
  writing-mode:vertical-rl;font-weight:850;font-size:clamp(90px,26vw,150px);
  letter-spacing:.06em;line-height:1;color:transparent;
  -webkit-text-stroke:1px rgba(188,255,85,.09);user-select:none}
:root[data-theme="light"] #wz{-webkit-text-stroke:1px rgba(9,11,13,.07)}

.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;
  padding:env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 30px)}
/* Die App tritt hinter dem Vorhang hervor */
.buehne .wrap{animation:buehneAuf .8s var(--weich) .3s both}
@keyframes buehneAuf{from{opacity:.4;transform:translateY(12px) scale(.985)}to{opacity:1;transform:none}}

button,input{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}

/* ── Kopfzeile ───────────────────────────────────────────── */
.bar{display:flex;align-items:center;gap:11px;padding:17px 2px 15px;position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg,var(--ink) 66%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.crumb{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);font-weight:500;display:inline-flex;align-items:center;gap:9px}
.crumb::before{content:"";width:16px;height:15px;flex:none;
  background:linear-gradient(90deg,var(--acid) 0 2px,transparent 2px 4px,var(--acid) 4px 7px,
    transparent 7px 10px,var(--acid) 10px 13px,transparent 13px 16px);
  clip-path:polygon(0 52%,2px 52%,2px 100%,0 100%, 4px 23%,7px 23%,7px 100%,4px 100%,
    10px 0,13px 0,13px 100%,10px 100%)}
.back{border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--paper);
  font-size:16px;width:33px;height:33px;flex:none;display:grid;place-items:center;
  transition:transform .2s var(--federn),border-color .2s,color .2s}
.back:active{transform:translateX(-2px) scale(.92);border-color:var(--orange);color:var(--orange)}
.pill{margin-left:auto;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 8px;background:var(--acid);color:#101A07}
.pill.ab{background:var(--cyan);color:#052A29}
.net{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 8px;border:1px solid var(--line);color:var(--muted);
  display:inline-flex;align-items:center;gap:6px}
.net::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--acid);
  box-shadow:0 0 12px rgba(188,255,85,.9)}
.net.off{color:var(--orange);border-color:rgba(255,113,72,.4)}
.net.off::before{background:var(--orange);box-shadow:0 0 12px rgba(255,113,72,.9)}
.net.q{color:var(--cyan);border-color:rgba(113,228,223,.4)}
.net.q::before{background:var(--cyan);box-shadow:0 0 12px rgba(113,228,223,.9);
  animation:ping2 1.6s ease-out infinite}
@keyframes ping2{50%{opacity:.25}}

/* ── Typo ────────────────────────────────────────────────── */
h1{font-size:clamp(40px,12vw,58px);line-height:.86;letter-spacing:-.075em;font-weight:850;
  text-transform:uppercase;margin:30px 0 0}
h1 em{display:block;color:var(--acid);font-style:normal}
.sub{color:#C7D0CA;font-size:14.5px;line-height:1.6;margin:20px 0 28px;max-width:34ch}
:root[data-theme="light"] .sub{color:#4A544F}
label{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin:0 0 9px;font-weight:500}

input[type=text]{width:100%;padding:12px 0 11px;border:0;border-bottom:1px solid rgba(188,255,85,.5);
  background:transparent;color:var(--paper);font-family:var(--mono);font-size:17px;
  letter-spacing:.03em;margin-bottom:22px;
  transition:border-color .22s var(--weich),box-shadow .22s var(--weich)}
input[type=text]::placeholder{color:var(--dim)}
input[type=text]:focus{outline:none;border-bottom-color:var(--acid);
  box-shadow:0 12px 26px -22px var(--acid)}

.seg{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;margin-bottom:26px;
  border:1px solid var(--line)}
.seg button{padding:14px 4px;border:0;border-right:1px solid var(--line);background:transparent;
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);transition:background .2s var(--weich),color .2s,transform .18s var(--federn)}
.seg button:last-child{border-right:0}
.seg button[aria-pressed=true]{background:var(--paper);color:var(--ink);font-weight:700}
.seg button:active{transform:scale(.96)}

.btn{width:100%;min-height:58px;padding:18px;border:0;font-size:16px;font-weight:850;
  letter-spacing:-.02em;margin-top:11px;display:block;text-align:center;
  transition:transform .16s var(--weich),background .2s,color .2s,box-shadow .26s var(--weich)}
.btn.go{background:var(--acid);color:#0B1503;box-shadow:0 16px 40px -18px rgba(188,255,85,.9)}
.btn.primary{background:var(--paper);color:var(--ink);box-shadow:0 14px 34px -18px rgba(0,0,0,.9)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;min-height:50px;padding:15px}
.btn.ghost:active{border-color:var(--acid);color:var(--acid)}
.btn:active:not(:disabled){transform:scale(.978) translateY(1px)}
.btn:disabled{opacity:.3}

/* ── Kamera ──────────────────────────────────────────────── */
.stage{position:relative;overflow:hidden;aspect-ratio:3/4;margin:16px 0;isolation:isolate;
  background:radial-gradient(circle at 45% 40%,#2B4B49,#080A0C 68%);
  border:1px solid rgba(188,255,85,.36);
  box-shadow:0 34px 90px -40px rgba(0,0,0,.95)}
video{width:100%;height:100%;object-fit:cover;display:block;opacity:.92}
.stage::before{content:"";position:absolute;z-index:1;width:400px;height:400px;
  right:-130px;top:-100px;border:1px solid rgba(113,228,223,.28);border-radius:50%;pointer-events:none}
.stage::after{content:"";position:absolute;z-index:1;width:250px;height:250px;
  right:-55px;top:-25px;border:1px solid rgba(188,255,85,.4);border-radius:50%;pointer-events:none}
.reticle{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:2}
.reticle div{position:relative;width:78%;aspect-ratio:2.4/1;
  border:1px solid rgba(243,246,241,.7);box-shadow:0 0 0 100vmax rgba(0,0,0,.4);
  transition:transform .3s var(--federn),border-color .2s;
  animation:atmen 3.4s ease-in-out infinite}
@keyframes atmen{50%{transform:scale(1.014)}}
.reticle div::before,.reticle div::after{content:"";position:absolute;width:34px;height:34px;
  border-color:var(--acid);transition:border-color .2s}
.reticle div::before{top:-2px;left:-2px;border-left:4px solid;border-top:4px solid}
.reticle div::after{right:-2px;bottom:-2px;border-right:4px solid;border-bottom:4px solid}
.stage.hit .reticle div{animation:none;transform:scale(.94);border-color:var(--acid)}
.stage.hit .reticle div::before,.stage.hit .reticle div::after{border-color:var(--paper)}
.scanline{position:absolute;z-index:3;left:11%;right:11%;top:44%;height:2px;background:var(--acid);
  box-shadow:0 0 22px 4px rgba(188,255,85,.64);pointer-events:none;
  animation:laser 2.4s ease-in-out infinite}
@keyframes laser{50%{transform:translateY(70px)}}
.scancap{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);text-align:center;margin:0 0 16px}

.chip{display:inline-flex;align-items:center;gap:9px;padding:9px 14px;margin-bottom:18px;
  border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--paper);
  font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.06em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acid);
  box-shadow:0 0 12px rgba(188,255,85,.8)}

/* ── Messdisplay ─────────────────────────────────────────── */
.readout{position:relative;overflow:hidden;padding:26px 22px;margin-bottom:14px;
  border:1px solid rgba(188,255,85,.4);isolation:isolate;
  background:linear-gradient(145deg,rgba(113,228,223,.14),transparent 40%),
    linear-gradient(180deg,#101619,#080A0C);
  box-shadow:0 30px 70px -34px rgba(0,0,0,1),0 0 60px -22px rgba(188,255,85,.5)}
.readout::before{content:"";position:absolute;z-index:-1;width:130%;height:46%;top:8%;left:-15%;
  border-top:1px solid rgba(188,255,85,.85);border-bottom:1px solid rgba(188,255,85,.85);
  opacity:.4;transform:skewY(-14deg);box-shadow:0 0 70px rgba(188,255,85,.13);
  animation:sweep 5s ease-in-out infinite}
@keyframes sweep{50%{transform:translateY(70px) skewY(-14deg);opacity:.14}}
.readout .cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--acid);margin-bottom:14px}
.num{font-family:var(--mono);font-size:60px;font-weight:700;color:var(--paper);text-align:center;
  min-height:70px;word-break:break-all;letter-spacing:-.06em;font-variant-numeric:tabular-nums;
  text-shadow:0 0 30px rgba(188,255,85,.5)}
:root[data-theme="light"] .num{color:#F3F6F1}
.num d{display:inline-block;animation:ziffer .18s var(--federn) both}
@keyframes ziffer{from{opacity:0;transform:translateY(-9px) scale(.7)}to{opacity:1;transform:none}}
.num .cur{color:var(--acid);animation:bl 1.1s steps(2) infinite}
@keyframes bl{50%{opacity:0}}
.unit{font-family:var(--mono);text-align:center;font-size:9px;color:#8D9994;
  letter-spacing:.34em;margin-top:8px}

.pad{display:grid;grid-template-columns:repeat(3,1fr);margin:18px 0;border:1px solid var(--line)}
.pad button{padding:22px 0;font-family:var(--mono);font-size:24px;font-weight:600;
  color:var(--paper);background:transparent;border:0;
  border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  transition:background .12s,color .12s,transform .1s var(--weich)}
.pad button:nth-child(3n){border-right:0}
.pad button:nth-child(n+10){border-bottom:0}
.pad button:active{background:var(--acid);color:#0B1503;transform:scale(.94)}
.pad button.fn{font-size:13px;letter-spacing:.1em;color:var(--muted)}

.photo{display:flex;align-items:center;gap:14px;padding:13px;margin-bottom:12px;
  border:1px dashed var(--line2);background:rgba(255,255,255,.02);
  transition:border-color .3s var(--weich),transform .16s var(--weich)}
.photo:active{transform:scale(.985)}
.photo img{width:54px;height:54px;object-fit:cover;flex:none;background:var(--panel2);
  border:1px solid var(--line)}
.photo.done{border-style:solid;border-color:rgba(188,255,85,.6)}
.photo.done img{animation:fotoRein .45s var(--federn) both}
@keyframes fotoRein{from{transform:scale(.6) rotate(-6deg)}to{transform:none}}
.photo .t{font-size:13.5px;font-weight:700}
.photo .s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;
  letter-spacing:.06em;text-transform:uppercase}
input[type=file]{display:none}

.typen{display:flex;flex-direction:column;border:1px solid var(--line)}
.typen button{padding:19px 17px;border:0;border-bottom:1px solid var(--line);
  background:transparent;font-size:15.5px;font-weight:700;color:var(--paper);text-align:left;
  letter-spacing:-.02em;transition:background .16s,color .16s,transform .14s var(--weich)}
.typen button:last-child{border-bottom:0}
.typen button:active{background:var(--acid);color:#0B1503;transform:scale(.99)}
.typen button.unk{font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;font-weight:500;color:var(--muted)}

.row{display:flex;align-items:center;gap:12px;padding:15px 2px;border-bottom:1px solid var(--line)}
.row .idx{font-family:var(--mono);font-size:9px;color:var(--dim);width:22px;flex:none}
.row .id{font-family:var(--mono);font-size:12.5px;color:var(--paper);flex:1;
  word-break:break-all;letter-spacing:.04em}
.row .id small{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);
  margin-top:4px;letter-spacing:.05em;text-transform:uppercase}
.row .st{font-family:var(--mono);font-size:8px;padding:3px 5px;flex:none;letter-spacing:.06em}
.st.p{background:var(--orange);color:#2A0F06}
.st.s{background:var(--acid);color:#101A07}
.st.e{background:var(--rot);color:#2A0806}
.row .val{font-family:var(--mono);font-size:14.5px;text-align:right;font-weight:600;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.row .val small{display:block;font-size:8.5px;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-top:3px}
.row.bad{background:rgba(255,113,72,.1);padding:15px 8px;margin:0 -6px;
  border-bottom-color:rgba(255,113,72,.3)}

.banner{padding:14px 16px;font-size:13.5px;line-height:1.55;margin:16px 0;
  border:1px solid;border-left-width:4px}
.banner.red{background:rgba(255,113,72,.1);border-color:rgba(255,113,72,.45);color:#FFB49B}
.banner.green{background:rgba(188,255,85,.08);border-color:rgba(188,255,85,.45);color:#D6FF9B}
.banner.amber{background:rgba(113,228,223,.08);border-color:rgba(113,228,223,.45);color:#A6EFEB}
:root[data-theme="light"] .banner.red{background:#FDEDE8;color:#8E2C24}
:root[data-theme="light"] .banner.green{background:#F1F8E4;color:#3B5910}
:root[data-theme="light"] .banner.amber{background:#E7F6F5;color:#0A5A61}
.banner b{display:block;margin-bottom:4px;font-weight:800}

.total{position:relative;overflow:hidden;padding:26px 22px;margin:18px 0;color:var(--paper);
  border:1px solid rgba(188,255,85,.4);isolation:isolate;
  background:linear-gradient(145deg,rgba(113,228,223,.16),transparent 40%),
    linear-gradient(180deg,#101619,#080A0C);
  box-shadow:0 30px 70px -34px rgba(0,0,0,1),0 0 60px -22px rgba(188,255,85,.5)}
.total::before{content:"";position:absolute;z-index:-1;width:130%;height:46%;top:6%;left:-15%;
  border-top:1px solid rgba(188,255,85,.85);border-bottom:1px solid rgba(188,255,85,.85);
  opacity:.35;transform:skewY(-14deg);animation:sweep 5s ease-in-out infinite}
.total .cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--acid)}
.total .big{font-family:var(--mono);font-size:58px;font-weight:700;margin-top:12px;
  font-variant-numeric:tabular-nums;letter-spacing:-.07em;color:#F3F6F1;
  text-shadow:0 0 30px rgba(188,255,85,.5)}
.total .big span{font-size:12px;color:#8D9994;margin-left:9px;letter-spacing:.1em;
  text-transform:uppercase}
.total .note{font-size:12.5px;color:#8D9994;margin-top:12px;line-height:1.5}

.arow{padding:17px;margin-bottom:9px;cursor:pointer;border:1px solid var(--line);
  background:rgba(255,255,255,.022);
  transition:transform .14s var(--weich),border-color .2s,background .2s}
.arow:active{transform:scale(.99);border-color:var(--acid);background:rgba(188,255,85,.06)}
.arow .top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.arow .aid{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.04em}
.arow .top .pill{margin-left:auto}
.arow .ameta{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.05em;
  text-transform:uppercase}

.meta{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:2.1;margin:20px 0;
  letter-spacing:.05em;text-transform:uppercase}
.meta b{color:var(--paper);font-weight:600}
.empty{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;
  padding:36px 0;line-height:1.8;letter-spacing:.05em}
.foot{font-family:var(--mono);font-size:9px;color:var(--dim);text-align:center;margin-top:20px;
  line-height:1.8;letter-spacing:.08em;text-transform:uppercase}

/* ═══ INSZENIERUNG ═══════════════════════════════════════════
   Screen-Choreografie läuft NUR bei .wechsel (Screenwechsel).
   Re-Renders derselben Ansicht — jede Tipptaste ruft render() —
   bleiben völlig ruhig. Das behebt nebenbei das bisherige stille
   Neu-Animieren bei jedem Tastendruck. */

#app.wechsel>*{animation:rein .55s var(--weich) both}
#app.wechsel.zurueck>*{animation-name:reinR}
@keyframes rein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes reinR{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
#app.wechsel>*:nth-child(2){animation-delay:.05s}
#app.wechsel>*:nth-child(3){animation-delay:.1s}
#app.wechsel>*:nth-child(4){animation-delay:.15s}
#app.wechsel>*:nth-child(5){animation-delay:.2s}
#app.wechsel>*:nth-child(6){animation-delay:.25s}
#app.wechsel>*:nth-child(7){animation-delay:.3s}
#app.wechsel>*:nth-child(8){animation-delay:.34s}
#app.wechsel>*:nth-child(9){animation-delay:.38s}
#app.wechsel>*:nth-child(10){animation-delay:.42s}
#app.wechsel>*:nth-child(11){animation-delay:.45s}
#app.wechsel>*:nth-child(12){animation-delay:.48s}
#app.wechsel>*:nth-child(13){animation-delay:.51s}
#app.wechsel>*:nth-child(14){animation-delay:.54s}
#app.wechsel>*:nth-child(n+15){animation-delay:.56s}

/* Titel: Maskenzug — die Zeile steigt aus einer unsichtbaren Kante */
#app.wechsel h1{animation:zeileAuf .7s var(--buehne) .06s both}
@keyframes zeileAuf{from{opacity:0;clip-path:inset(0 0 100% 0);transform:translateY(26px)}
  to{opacity:1;clip-path:inset(-8% 0 0 0);transform:none}}

/* Signaturen: Bühne, Display, Summe, Plakette */
#app.wechsel .stage{animation:stageRein .6s var(--weich) both}
@keyframes stageRein{from{opacity:0;transform:scale(.965)}to{opacity:1;transform:none}}
#app.wechsel .readout{animation:readRein .55s var(--weich) .08s both}
@keyframes readRein{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#app.wechsel .total{animation:totalRein .6s var(--federn) .08s both}
@keyframes totalRein{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
#app.wechsel .chip{animation:chipRein .42s var(--federn) both}
@keyframes chipRein{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:none}}
#app.wechsel .pad button{animation:padRein .3s var(--weich) both;
  animation-delay:calc(.12s + var(--i,0)*16ms)}
@keyframes padRein{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
#app.wechsel .typen button{animation:rein .34s var(--weich) both;
  animation-delay:calc(.08s + var(--i,0)*38ms)}

/* ── Intro: Vorhang ──────────────────────────────────────── */
#intro{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:26px}
#intro::before,#intro::after{content:"";position:absolute;left:0;right:0;height:50.3%;z-index:-1;
  background:radial-gradient(46rem 30rem at 50% 100%,rgba(113,228,223,.1),transparent 62%),
    linear-gradient(180deg,#0B0E10,#060809)}
#intro::before{top:0;border-bottom:1px solid rgba(188,255,85,.55);
  box-shadow:0 1px 26px rgba(188,255,85,.22)}
#intro::after{bottom:0;background:radial-gradient(46rem 30rem at 50% 0%,rgba(188,255,85,.07),transparent 60%),
    linear-gradient(0deg,#0B0E10,#060809);
  border-top:1px solid rgba(188,255,85,.55);box-shadow:0 -1px 26px rgba(188,255,85,.22)}
/* Öffnen: Inhalt zieht sich zurück, dann fahren die Hälften auseinander */
#intro.weg .bc,#intro.weg .marke,#intro.weg .untermarke{animation:inhaltWeg .22s var(--weich) forwards}
@keyframes inhaltWeg{to{opacity:0;transform:translateY(-8px) scale(.97)}}
#intro.weg::before{animation:vorhangOben .72s var(--buehne) .16s forwards}
#intro.weg::after{animation:vorhangUnten .72s var(--buehne) .16s forwards}
#intro.weg{pointer-events:none;animation:introFort .1s linear .95s forwards}
@keyframes vorhangOben{to{transform:translateY(-101%)}}
@keyframes vorhangUnten{to{transform:translateY(101%)}}
@keyframes introFort{to{visibility:hidden}}
/* Feste helle Farben: der Intro-Grund ist in BEIDEN Modi dunkel. */
.marke{font-size:34px;font-weight:850;letter-spacing:-.075em;text-transform:uppercase;
  color:#F3F6F1;opacity:0;animation:markeAuf .75s var(--buehne) .58s forwards}
.marke span{color:#BCFF55;text-shadow:0 0 30px rgba(188,255,85,.6)}
@keyframes markeAuf{from{opacity:0;clip-path:inset(0 0 100% 0);transform:translateY(20px)}
  to{opacity:1;clip-path:inset(-10% 0 0 0);transform:none}}
.untermarke{font-family:var(--mono);font-size:9px;letter-spacing:.4em;text-transform:uppercase;
  color:#53605B;opacity:0;animation:unterAuf .5s var(--weich) .92s forwards}
@keyframes unterAuf{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bc{position:relative;display:flex;align-items:flex-end;gap:3px;height:58px}
.bc i{display:block;width:3px;background:#F3F6F1;transform:scaleY(0);transform-origin:bottom;
  animation:bar .4s var(--federn) forwards}
.bc i.b{width:6px;background:#BCFF55;box-shadow:0 0 14px rgba(188,255,85,.5)}
.laserlinie{position:absolute;left:-18px;right:-18px;height:2px;background:#BCFF55;
  box-shadow:0 0 22px 4px rgba(188,255,85,.64);opacity:0;animation:lz 1.1s var(--weich) .55s}
@keyframes bar{to{transform:scaleY(1)}}
@keyframes lz{0%{opacity:0;top:-8px}25%{opacity:1}75%{opacity:1}100%{opacity:0;top:62px}}

/* ── Treffer + Toast ─────────────────────────────────────── */
#blitz{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;
  background:radial-gradient(circle at 50% 42%,rgba(188,255,85,.55),rgba(188,255,85,.1) 60%,transparent 78%)}
#blitz.an{animation:blitz .38s var(--weich)}
@keyframes blitz{0%{opacity:1}100%{opacity:0}}
#toast{position:fixed;left:50%;bottom:26px;padding:13px 18px;z-index:70;max-width:88%;
  text-align:center;display:block;font-family:var(--mono);font-size:11px;letter-spacing:.04em;
  color:#090B0D;background:#BCFF55;box-shadow:0 16px 44px rgba(0,0,0,.5);
  transform:translate(-50%,120px);opacity:0;
  transition:transform .38s var(--federn),opacity .28s var(--weich)}
#toast.an{transform:translate(-50%,0);opacity:1}

/* Wer Bewegung abstellt, bekommt keine. Kein Halbweg. */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  #intro{display:none}
  #wz,#glow{transform:none!important}
}
</style>

<body>
<div id="glow" aria-hidden="true"></div><div id="wz" aria-hidden="true">TORREK</div>
<div id="intro"><div class="bc"><div class="laserlinie"></div></div><div class="marke">Torrek <span>Scan</span></div><div class="untermarke">Field System</div></div>
<div id="blitz"></div>
<div id="toast"></div>

<div class="wrap"><div class="bar" id="bar"></div><div id="app"></div></div>
<input type="file" id="cam" accept="image/*" capture="environment">
<input type="file" id="barcode" accept="image/*" capture="environment">

<!-- Lokal gebündelt statt CDN: die App startet und scannt auch beim ersten Mal offline. -->
<script src="vendor/zxing-0.21.3.min.js"></script>
<script src="vendor/xlsx-0.18.5.full.min.js"></script>
<script>
/* ================= Konfiguration ================= */
const FN  = "https://zkuawtrwtmxhayshuxzv.supabase.co/functions/v1/torrek-scan";
const KEY = "torrek-scan.cfg";
const ruhig = matchMedia("(prefers-reduced-motion: reduce)").matches;

// Service Worker: App-Shell + Libs cachen → offline lauffähig und installierbar.
if("serviceWorker" in navigator)
  addEventListener("load",()=>navigator.serviceWorker.register("sw.js",{updateViaCache:"none"}).catch(()=>{}));

/* ================= Darstellung (Hell/Dunkel) =================
   Voreinstellung „auto" folgt dem System; „light"/"dark" erzwingen. */
const THEMEKEY="torrek-scan.theme";
const themePref=()=>{try{return localStorage.getItem(THEMEKEY)||"auto"}catch(e){return "auto"}};
function applyTheme(){
  const pref=themePref();
  const dunkel = pref==="dark" || (pref==="auto" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.dataset.theme = dunkel?"dark":"light";
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.content = dunkel?"#090B0D":"#EFF1EC";
}
function setTheme(p){ try{localStorage.setItem(THEMEKEY,p)}catch(e){} sichereSetupFelder(); applyTheme(); render(); }
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(themePref()==="auto") applyTheme(); });
applyTheme();

(function intro(){
  const bc=document.querySelector(".bc"), el=document.getElementById("intro");
  if(ruhig){ el.remove(); return; }
  [2,1,3,1,1,2,3,1,2,1,1,3,2,1,1,2,3,1,2,2,1,3,1,1,2].forEach((w,i)=>{
    const b=document.createElement("i");
    if(w>2) b.className="b";
    b.style.height=(26+Math.random()*28)+"px";
    b.style.animationDelay=(i*22)+"ms";
    bc.appendChild(b);
  });
  setTimeout(()=>{
    document.documentElement.classList.add("buehne");   // App tritt hinter dem Vorhang hervor
    el.classList.add("weg");
    setTimeout(()=>el.remove(),980);
  },1850);
})();

/* ================= Offline-Speicher =================
   Erfassung geht IMMER zuerst hierhin. Der Server kommt später.  */
const DB={_p:null};
DB.open=()=>DB._p||(DB._p=new Promise((res,rej)=>{
  const r=indexedDB.open("torrek-scan",1);
  r.onupgradeneeded=()=>{const d=r.result;
    if(!d.objectStoreNames.contains("rows")) d.createObjectStore("rows",{keyPath:"local_id"});
    if(!d.objectStoreNames.contains("cache")) d.createObjectStore("cache",{keyPath:"k"});};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);}));
const tx=async(store,mode,fn)=>{const d=await DB.open();return new Promise((res,rej)=>{
  const t=d.transaction(store,mode),s=t.objectStore(store);const out=fn(s);
  t.oncomplete=()=>res(out&&out.result!==undefined?out.result:out);t.onerror=()=>rej(t.error);});};
DB.put=(o)=>tx("rows","readwrite",s=>s.put(o));
DB.all=()=>tx("rows","readonly",s=>s.getAll());
DB.del=(id)=>tx("rows","readwrite",s=>s.delete(id));
DB.cput=(k,v)=>tx("cache","readwrite",s=>s.put({k,v}));
DB.cget=async(k)=>{const r=await tx("cache","readonly",s=>s.get(k));return r?r.v:null;};

/* ================= Zustand ================= */
let S={screen:"setup",cfg:{code:"",projekt:"",mieter:"",modus:"aufbau"},
       rows:[],pending:null,buf:"",reader:null,stream:null,offen:[],sync:false,
       typen:[],bekannt:{},einst:{},zurueck:false,archivSel:null,serverVerlauf:null};
const $=id=>document.getElementById(id), bar=$("bar"), app=$("app");
const fmt=n=>Number(n).toLocaleString("de-DE",{maximumFractionDigits:0});
const esc=s=>String(s??"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
const heute=()=>new Date().toLocaleDateString("de-DE");
// Exakter Zeitpunkt einer Erfassung — auf Tag und Uhrzeit genau, nie „heute".
const wann=ts=>new Date(ts).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tag=ts=>new Date(ts).toLocaleDateString("de-DE");
// Zähl-Nomen-Kongruenz: 1 Gerät, aber 2 Geräte. Vermeidet „1 Geräte".
const nomen=(n,ein,mehr)=>n===1?ein:mehr;
// Gelöschte Zeilen (Papierkorb) sind überall ausgeblendet — außer im Papierkorb selbst.
const meine=()=>S.rows.filter(r=>r.projekt===S.cfg.projekt&&r.modus===S.cfg.modus&&!r.geloescht);
// Alle Erfassungen zu Projekt+Modus (für das Archiv), chronologisch.
const rowsFuer=(p,m)=>S.rows.filter(r=>r.projekt===p&&r.modus===m&&!r.geloescht).sort((a,b)=>a.ts-b.ts);
// Verlauf: Listen dieses Geräts, gruppiert nach Projekt+Modus. geloescht=true → Papierkorb.
function archivGruppen(geloescht=false){
  const g={};
  for(const r of S.rows){
    if(!!r.geloescht!==geloescht) continue;
    const k=r.projekt+"|"+r.modus;
    (g[k]||(g[k]={projekt:r.projekt,modus:r.modus,mieter:r.mieter,rows:[]})).rows.push(r);}
  return Object.values(g).map(x=>{const ts=x.rows.map(r=>r.ts);
    x.von=Math.min(...ts); x.bis=Math.max(...ts); x.n=x.rows.length;
    x.geloeschtAm=geloescht?Math.max(...x.rows.map(r=>r.geloescht||0)):0; return x;})
    .sort((a,b)=>geloescht?b.geloeschtAm-a.geloeschtAm:b.bis-a.bis);
}

/* ================= Server ================= */
async function ruf(body){
  const r=await fetch(FN,{method:"POST",
    headers:{"Content-Type":"application/json","x-app-code":S.cfg.code},
    body:JSON.stringify(body)});
  const j=await r.json().catch(()=>({fehler:"Antwort unlesbar"}));
  if(!r.ok) throw Object.assign(new Error(j.fehler||("HTTP "+r.status)),{status:r.status,daten:j});
  return j;
}
async function ladeOffen(){
  if(S.cfg.modus!=="abbau"||!navigator.onLine) { S.offen=await DB.cget("offen:"+S.cfg.projekt)||[]; return; }
  try{
    const j=await ruf({aktion:"projekt",projektnummer:S.cfg.projekt});
    S.offen=j.offen||[]; await DB.cput("offen:"+S.cfg.projekt,S.offen);
  }catch(e){ S.offen=await DB.cget("offen:"+S.cfg.projekt)||[]; }
}
// Typenliste + bekannte Geräte cachen, damit die App offline weiß,
// ob ein Barcode neu ist und nach dem Typ gefragt werden muss.
async function ladeStammdaten(){
  S.typen=await DB.cget("typen")||[]; S.bekannt=await DB.cget("bekannt")||{};
  S.einst=await DB.cget("einst")||{};
  if(!navigator.onLine) return;
  try{
    const j=await ruf({aktion:"stammdaten"});
    S.typen=j.typen||[]; S.bekannt=j.bekannt||{};
    S.einst=j.einstellungen||{};
    await DB.cput("typen",S.typen); await DB.cput("bekannt",S.bekannt);
    await DB.cput("einst",S.einst);
  }catch(e){}
}
// Roadmap #6: Foto-Erinnerung/-Pflicht, pro Büro über den Server einstellbar
// (scan_einstellung: foto_pflicht = aus | hinweis | pflicht). Ohne Server-
// Vorgabe bleibt sie AUS — die App ändert ihr Verhalten nie von allein.
const fotoStufe=()=>S.einst.foto_pflicht||"aus";
// FR-SCAN-020/021: nach dem Typ nur beim ersten unbekannten Barcode fragen.
const brauchtTyp=code=>!S.bekannt[code];

// FR-SCAN-040..043: Offline-Queue — pending zuerst lokal, best-effort senden,
// bei 401 (falscher Code) abbrechen, bei „online" automatisch nachholen.
async function syncen(){
  if(S.sync||!navigator.onLine) return;
  S.sync=true; render();
  for(const r of S.rows.filter(x=>x.status!=="synced"&&!x.geloescht)){
    try{
      const j=await ruf({aktion:"erfassen",code:r.code,projektnummer:r.projekt,mieter:r.mieter,
        modus:r.modus,kwh:r.wert,foto:r.foto||null,local_id:r.local_id,
        typ_id:r.geraetetyp_id||null,standort:r.standort||null,notiz:r.notiz||null});
      r.status="synced"; r.fehler=null; r.neu=j.geraet_neu_angelegt||false;
      if(j.differenz!=null) r.diff=j.differenz;
      r.foto=null;                       // nach dem Hochladen Platz freigeben
      if(r.geraetetyp_id){ S.bekannt[r.code]=r.geraetetyp_id; await DB.cput("bekannt",S.bekannt); }
      await DB.put(r);
    }catch(e){
      r.status="error"; r.fehler=e.message; await DB.put(r);
      if(e.status===401) break;          // falscher Code: gar nicht erst weiterrennen
    }
  }
  S.sync=false; render();
}
window.addEventListener("online",()=>syncen());

/* ================= Kamera ================= */
function hints(){const h=new Map(), F=ZXing.BarcodeFormat;
  // Mehrere 1D-Symbologien zulassen — Geräte-Etiketten sind nicht immer CODE-128.
  // Der onScan-Filter (nur 6–14 Ziffern) hält Fehltreffer draußen.
  h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [F.CODE_128,F.CODE_39,F.CODE_93,F.ITF,F.CODABAR,F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E]);
  h.set(ZXing.DecodeHintType.TRY_HARDER,true);return h;}
// Ziel des nächsten Foto-Scans: "geraet" (Etikettennummer) oder "projekt"
// (Projektnummer im Setup). Wird pro Klick gesetzt und nach dem Lesen
// im onchange sofort zurückgesetzt, damit nie ein Scan falsch landet.
let scanZiel="geraet";
// Vor dem Foto-Lesen die Live-Kamera stoppen — sonst laufen Kamera UND
// Foto-Dekodierung gleichzeitig und sprengen den Speicher.
function fotoScan(){scanZiel="geraet";stopCam();$("barcode").click();}
// Roadmap #2: Projektnummer per Barcode statt tippen — verhindert Zahlendreher
// im kritischen Schlüssel zwischen Aufbau und Abbau.
function scanProjekt(){sichereSetupFelder();scanZiel="projekt";$("barcode").click();}
function stopCam(){try{S.reader&&S.reader.reset()}catch(e){}
  if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null}S.reader=null;S.torch=false;}
// Roadmap #4: Taschenlampe für dunkle Keller. Nutzt die torch-Fähigkeit der
// Kamera (nicht überall vorhanden) — wenn nicht, ehrlicher Hinweis statt Fehler.
async function toggleTorch(){
  const tr=S.stream&&S.stream.getVideoTracks&&S.stream.getVideoTracks()[0];
  if(!tr){ toast("Kamera ist gerade nicht aktiv"); return; }
  const caps=tr.getCapabilities?tr.getCapabilities():null;
  if(!caps||!caps.torch){ toast("Dieses Gerät hat keine schaltbare Taschenlampe"); return; }
  try{
    S.torch=!S.torch;
    await tr.applyConstraints({advanced:[{torch:S.torch}]});
    const b=$("torchbtn"); if(b) b.textContent=S.torch?"Licht aus":"Licht an";
    if(navigator.vibrate&&!ruhig) navigator.vibrate(8);
  }catch(e){ S.torch=false; toast("Taschenlampe ließ sich nicht schalten"); }
}
async function startCam(){
  try{
    // Standard-Auflösung (kein Zwang) — schont Speicher auf schwächeren Handys.
    S.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
    // Dauerfokus anfordern, wo unterstützt (kostet keinen Speicher).
    try{const tr=S.stream.getVideoTracks()[0], caps=tr.getCapabilities&&tr.getCapabilities();
      if(caps&&caps.focusMode&&caps.focusMode.includes("continuous"))
        await tr.applyConstraints({advanced:[{focusMode:"continuous"}]});}catch(e){}
    const v=$("v"); v.srcObject=S.stream; await v.play();
    S.reader=new ZXing.BrowserMultiFormatReader(hints());
    S.reader.decodeFromVideoElement(v,r=>{if(r)onScan(r.getText())});
  }catch(e){ $("camerr").innerHTML=`<div class="banner red"><b>Kamera geht nicht (${esc(e.name)})</b>
    Aus WhatsApp/Mail geöffnet? Link in Safari oder Chrome öffnen. Sonst unten eintippen.</div>`; }
}
// Barcode aus einem Foto lesen — robuster als Live-Kamera bei schwierigen Etiketten.
// SPEICHERSPARSAM: mit createImageBitmap direkt verkleinert dekodieren (kein
// Voll-Megapixel-Bitmap), Kamera ist vorher gestoppt. Sonst stürzt die App ab.
async function barcodeAusBild(f,ziel="geraet"){
  if(!f) return;
  toast("Foto wird gelesen …");
  try{
    const cap=1000;
    let src=null;
    try{ src=await createImageBitmap(f,{resizeWidth:cap,resizeQuality:"medium"}); }catch(e){}
    if(!src){                                   // Fallback ohne createImageBitmap-Resize
      const img=new Image(), url=URL.createObjectURL(f);
      await new Promise((res,rej)=>{img.onload=res;img.onerror=()=>rej(0);img.src=url;});
      URL.revokeObjectURL(url); src=img;
    }
    const sw=src.width||src.naturalWidth, sh=src.height||src.naturalHeight;
    const sc=Math.min(1,cap/Math.max(sw,sh));
    const cv=document.createElement("canvas");
    cv.width=Math.max(1,Math.round(sw*sc)); cv.height=Math.max(1,Math.round(sh*sc));
    cv.getContext("2d").drawImage(src,0,0,cv.width,cv.height);
    src.close&&src.close();
    const durl=cv.toDataURL("image/jpeg",0.85);
    const r=await new ZXing.BrowserMultiFormatReader(hints()).decodeFromImageUrl(durl).catch(()=>null);
    if(r&&r.getText()){ verarbeiteScan(r.getText(),ziel); return; }
    toast("Kein Barcode erkannt — gerade, nah, gutes Licht");
  }catch(e){ toast("Foto konnte nicht gelesen werden"); }
  if(S.screen==="scan") render();               // Live-Kamera wieder starten
}
// Ein gelesener Code geht je nach Ziel an die Geräte-Erfassung (onScan) oder
// füllt im Setup die Projektnummer. Getrennt gehalten, damit der strenge
// Ziffernfilter von onScan nicht die (auch mal alphanumerische) Projektnummer verwirft.
function verarbeiteScan(text,ziel){
  if(ziel==="projekt"){
    const p=(text||"").trim();
    if(!p){ toast("Nichts erkannt — bitte erneut"); return; }
    S.cfg.projekt=p;
    const el=$("p"); if(el) el.value=p;      // Feld direkt füllen, kein Re-Render
    toast("Projektnummer übernommen: "+p);
    return;
  }
  onScan(text);
}
// FR-SCAN-010/012/013: nur CODE-128-Ziffern übernehmen, keine Doppel,
// im Abbau nur Geräte, die zu diesem Projekt gehören.
function onScan(code){
  if(S.pending||!/^\d{6,14}$/.test(code)) return;
  if(meine().some(r=>r.code===code)){toast("Schon erfasst: "+code);return}
  if(S.cfg.modus==="abbau"&&S.offen.length&&!S.offen.some(o=>o.geraet_inventarnummer===code)){
    toast("Gehört nicht zu diesem Projekt"); return;
  }
  treffer(); stopCam(); S.pending={code}; S.buf="";
  // Typ nur fragen, wenn er noch fehlt — bei bekannten Geräten passiert gar nichts.
  setTimeout(()=>{ S.screen = brauchtTyp(code) ? "typ" : "wert"; render(); }, ruhig?0:170);
}
function treffer(){
  const b=document.getElementById("blitz"), st=document.querySelector(".stage");
  if(!ruhig){
    b.classList.remove("an"); void b.offsetWidth; b.classList.add("an");
    if(st){ st.classList.add("hit"); setTimeout(()=>st.classList.remove("hit"),320); }
  }
  if(navigator.vibrate) navigator.vibrate([28,40,18]);
}
let tt=null;
function toast(m){
  const e=document.getElementById("toast"); clearTimeout(tt);
  e.textContent=m; e.classList.add("an");
  tt=setTimeout(()=>e.classList.remove("an"),2400);
}

/* ================= Foto ================= */
let photoCb=null;
$("cam").onchange=async ev=>{const f=ev.target.files[0];ev.target.value="";
  if(f&&photoCb) photoCb(await shrink(f));};
$("barcode").onchange=async ev=>{const f=ev.target.files[0];ev.target.value="";
  const ziel=scanZiel; scanZiel="geraet";     // pro Klick, danach sofort zurück auf Standard
  await barcodeAusBild(f,ziel);};
const shrink=file=>new Promise(res=>{const img=new Image(),u=URL.createObjectURL(file);
  img.onload=()=>{const m=1200,sc=Math.min(1,m/Math.max(img.width,img.height));
    const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(u);
    res(c.toDataURL("image/jpeg",0.7))};img.src=u;});

/* ================= Excel ================= */
// Parameterisiert nach Projekt+Modus, damit auch archivierte Listen exportierbar
// sind. Datum je Zeile = echter Erfassungs-Tag (r.ts), nicht „heute".
function wbFuer(projekt,modus,mieter){
  const ab=modus==="abbau", rows=rowsFuer(projekt,modus);
  const listenTag=rows.length?tag(rows[0].ts):heute();
  const a=[["Geräteliste – Bautrocknung"],["Projektnummer:",projekt],["Datum:",listenTag],
           ["Mieter:",mieter],[]];
  a.push(ab?["Nr.","Gerät","Standort","Datum","Mieter","kWh Auf","kWh Ab","Differenz","Notiz"]
           :["Nr.","Gerät","Standort","Datum","Mieter","kWh","Auf","Ab","Notiz"]);
  rows.forEach((r,i)=>a.push(ab?[i+1,r.code,r.standort||"",tag(r.ts),mieter,r.auf??"",r.wert,r.diff??"",r.notiz||""]
                              :[i+1,r.code,r.standort||"",tag(r.ts),mieter,r.wert,"X","",r.notiz||""]));
  if(ab){const s=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
    a.push([]);a.push(["","","","","","Gesamtverbrauch",+s.toFixed(2),"kWh"]);}
  const ws=XLSX.utils.aoa_to_sheet(a);
  ws["!cols"]=[{wch:5},{wch:16},{wch:16},{wch:12},{wch:14},{wch:11},{wch:11},{wch:11},{wch:20}];
  const b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,ws,"Geräteliste");return b;
}
const wb=()=>wbFuer(S.cfg.projekt,S.cfg.modus,S.cfg.mieter);
const fnameFuer=(projekt,modus)=>`Geraeteliste_${String(projekt).replace(/\s+/g,"")}_${modus==="abbau"?"Abbau":"Aufbau"}.xlsx`;
// FR-SCAN-050/052: Excel als Zettel fürs Büro — teilen, sonst Download.
async function sendenFuer(projekt,modus,mieter){
  const ab=modus==="abbau", rows=rowsFuer(projekt,modus);
  const sum=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
  const listenTag=rows.length?tag(rows[0].ts):heute();
  const betreff=`Geräteliste ${projekt} — ${ab?"Abbau":"Aufbau"} ${listenTag}`;
  const text=`Projekt: ${projekt}\nMieter: ${mieter}\nGeräte: ${rows.length}\n`+
    (ab?`Gesamtverbrauch: ${fmt(+sum.toFixed(2))} kWh\n`:"");
  try{
    const out=XLSX.write(wbFuer(projekt,modus,mieter),{bookType:"xlsx",type:"array"});
    const file=new File([out],fnameFuer(projekt,modus),{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    if(navigator.canShare&&navigator.canShare({files:[file]}))
      return void await navigator.share({files:[file],title:betreff,text});
  }catch(e){}
  XLSX.writeFile(wbFuer(projekt,modus,mieter),fnameFuer(projekt,modus));
}
async function senden(){ return sendenFuer(S.cfg.projekt,S.cfg.modus,S.cfg.mieter); }

function zaehlHoch(el,ziel){
  if(!el) return;
  if(ruhig){ el.firstChild.textContent=fmt(ziel); return; }
  const t0=performance.now(), dauer=760;
  const lauf=t=>{ const p=Math.min(1,(t-t0)/dauer), e=1-Math.pow(1-p,3);
    el.firstChild.textContent=fmt(Math.round(ziel*e));
    if(p<1) requestAnimationFrame(lauf); };
  requestAnimationFrame(lauf);
}

      <p class="meta"><b>Projekt</b> ${esc(S.cfg.projekt)}<br><b>Mieter</b> ${esc(S.cfg.mieter)}<br>
        <b>Datum</b> ${heute()}<br><b>Geräte</b> ${rows.length}</p>
      <button class="btn go" onclick="senden()">Excel erzeugen und ans Büro</button>
      <button class="btn ghost" onclick="go('setup')">Neue Liste</button>
      <p class="foot">Torrek Scan speichert getrennt von Torrek.<br>Die Excel ist der Zettel fürs Büro.</p>`;
    if(ab) zaehlHoch(document.getElementById("sum"),sum);
  }
}

/* ================= Aktionen ================= */
// Vor jedem Re-Render des Setups die bereits getippten Felder sichern —
// sonst löscht ein Umschalten (Modus/Darstellung) Code/Projekt/Mieter.
function sichereSetupFelder(){const c=$("c"),p=$("p"),mm=$("m");
  if(c)S.cfg.code=c.value; if(p)S.cfg.projekt=p.value; if(mm)S.cfg.mieter=mm.value;}
function setModus(m){sichereSetupFelder();S.cfg.modus=m;render();}
function go(s){stopCam();S.screen=s;render()}
function zurueck(s){S.zurueck=true;go(s)}
// Archiv: eine frühere Liste öffnen, live filtern (ohne Re-Render), erneut exportieren.
function oeffneArchiv(p,m){const g=archivGruppen().find(x=>x.projekt===p&&x.modus===m);
  S.archivSel={projekt:p,modus:m,mieter:g?g.mieter:""};go("archivDetail");}
function filterArchiv(q){q=(q||"").toLowerCase();
  document.querySelectorAll("#archivliste .arow").forEach(el=>{
    el.style.display=el.dataset.p.toLowerCase().includes(q)?"":"none";});}
function exportArchiv(){const s=S.archivSel;if(s)sendenFuer(s.projekt,s.modus,s.mieter);}
// Löschen mit Warnung → in den Papierkorb (rückgängig machbar).
function listeLoeschen(p,m){
  const g=archivGruppen().find(x=>x.projekt===p&&x.modus===m), n=g?g.n:0;
  if(!confirm(`Liste „${p}" (${m==="abbau"?"Abbau":"Aufbau"}) mit ${n} ${nomen(n,"Gerät","Geräten")} löschen?\n\nSie wandert in den Papierkorb und lässt sich dort wiederherstellen.`)) return;
  const ts=Date.now();
  S.rows.forEach(r=>{ if(r.projekt===p&&r.modus===m&&!r.geloescht){ r.geloescht=ts; DB.put(r); } });
  toast("Liste gelöscht — im Papierkorb wiederherstellbar");
  go("archiv");
}
function listeWiederherstellen(p,m){
  S.rows.forEach(r=>{ if(r.projekt===p&&r.modus===m&&r.geloescht){ r.geloescht=null; DB.put(r); } });
  toast("Liste wiederhergestellt"); render();
}
// Endgültig entfernen — mit zweiter, klarer Warnung (nicht umkehrbar).
function listeEndgueltig(p,m){
  const g=archivGruppen(true).find(x=>x.projekt===p&&x.modus===m), n=g?g.n:0;
  if(!confirm(`Liste „${p}" ENDGÜLTIG löschen? ${n} ${nomen(n,"Gerät","Geräten")}.\n\nDas kann NICHT rückgängig gemacht werden.`)) return;
  S.rows.filter(r=>r.projekt===p&&r.modus===m&&r.geloescht).forEach(r=>DB.del(r.local_id));
  S.rows=S.rows.filter(r=>!(r.projekt===p&&r.modus===m&&r.geloescht));
  toast("Endgültig gelöscht"); render();
}
// Büro-Archiv: Projektnummer geräteübergreifend am Server nachschlagen (aktion "verlauf").
async function serverSuche(){
  const q=($("archivsuche")?.value||"").trim();
  if(!q){toast("Erst eine Projektnummer eintippen");return}
  if(!navigator.onLine){toast("Fürs Büro-Archiv brauchst du Netz");return}
  toast("Suche im Büro-Archiv …");
  try{
    const j=await ruf({aktion:"verlauf",projektnummer:q});
    S.serverVerlauf={projektnummer:q,erfassungen:j.erfassungen||[]};
    go("serverArchiv");
  }catch(e){
    if(e.status===401) toast("Zugangscode fehlt oder falsch (im Setup prüfen)");
    else if(e.status===400) toast("Server kennt die Archiv-Suche noch nicht");
    else toast(e.message||"Suche fehlgeschlagen");
  }
}
function exportServer(){
  const v=S.serverVerlauf; if(!v||!v.erfassungen.length)return;
  const es=v.erfassungen, mieter=(es.find(r=>r.mieter)||{}).mieter||"";
  const a=[["Büro-Archiv – Bautrocknung"],["Projektnummer:",v.projektnummer],["Mieter:",mieter],
           ["Erzeugt:",wann(Date.now())],[]];
  a.push(["Nr.","Gerät","Standort","Modus","Datum/Uhrzeit","kWh","Differenz","Gerätetyp","Notiz"]);
  es.forEach((r,i)=>a.push([i+1,r.code,r.standort||"",r.modus,wann(r.erfasst_am),r.kwh,r.differenz??"",r.typ||"",r.notiz||""]));
  const ab=es.filter(r=>r.modus==="abbau");
  if(ab.length){const s=ab.reduce((x,r)=>x+(Number(r.differenz)||0),0);
    a.push([]);a.push(["","","","","","Gesamtverbrauch",+s.toFixed(2),"kWh"]);}
  const ws=XLSX.utils.aoa_to_sheet(a);
  ws["!cols"]=[{wch:5},{wch:16},{wch:16},{wch:9},{wch:18},{wch:10},{wch:11},{wch:18},{wch:20}];
  const b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,ws,"Büro-Archiv");
  const fn=`Buero-Archiv_${String(v.projektnummer).replace(/\s+/g,"")}.xlsx`;
  try{const out=XLSX.write(b,{bookType:"xlsx",type:"array"});
    const file=new File([out],fn,{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    if(navigator.canShare&&navigator.canShare({files:[file]}))
      return void navigator.share({files:[file],title:"Büro-Archiv "+v.projektnummer});}catch(e){}
  XLSX.writeFile(b,fn);
}
// Roadmap #8: Mehrere Baustellen am Tag — die letzten Projekte merken und
// im Setup als antippbare Chips anbieten. Zugangscode + Modus bleiben stehen,
// nur Projekt und Mieter wechseln. Rein lokal (localStorage), max 4.
const LETZTEKEY="torrek-scan.letzte";
function letzteLaden(){try{return JSON.parse(localStorage.getItem(LETZTEKEY)||"[]")}catch(e){return[]}}
function merkeBaustelle(projekt,mieter){
  const l=[{projekt,mieter}].concat(letzteLaden().filter(x=>x.projekt!==projekt)).slice(0,4);
  try{localStorage.setItem(LETZTEKEY,JSON.stringify(l))}catch(e){}
}
function nutzeLetzte(i){
  sichereSetupFelder();
  const l=letzteLaden()[i]; if(!l) return;
  S.cfg.projekt=l.projekt; S.cfg.mieter=l.mieter||"";
  render(); toast("Baustelle gewechselt: "+l.projekt);
}
// FR-SCAN-001/002: Setup einmal ausfüllen; ohne Code/Projekt kein Start.
async function los(){
  S.cfg.code=$("c").value.trim(); S.cfg.projekt=$("p").value.trim(); S.cfg.mieter=$("m").value.trim();
  if(!S.cfg.code||!S.cfg.projekt){toast("Code und Projektnummer fehlen");return}
  localStorage.setItem(KEY,JSON.stringify(S.cfg));
  merkeBaustelle(S.cfg.projekt,S.cfg.mieter);
  await ladeStammdaten();
  await ladeOffen();
  if(S.cfg.modus==="abbau"&&!S.offen.length&&navigator.onLine)
    toast("Kein offener Aufbau zu diesem Projekt");
  go("scan");
}
function refWert(code){const o=S.offen.find(x=>x.geraet_inventarnummer===code);
  return o?Number(o.zaehlerstand_start):null;}
// Standort eines (offenen) Geräts, vom Server geladen — für die „Gerät vergessen"-Warnung.
function standortVon(code){const o=S.offen.find(x=>x.geraet_inventarnummer===code);return o&&o.standort||"";}
const fehltLabel=c=>esc(c)+(standortVon(c)?` (${esc(standortVon(c))})`:"");
function fehlende(){if(S.cfg.modus!=="abbau")return[];
  const da=meine().map(r=>r.code);
  return S.offen.map(o=>o.geraet_inventarnummer).filter(c=>!da.includes(c));}
function ziffern(s){return s.split("").map(c=>`<d>${c}</d>`).join("")}
function key(k){
  if(k==="<")S.buf=S.buf.slice(0,-1);
  else if(k==="C")S.buf="";
  else if(S.buf.length<9)S.buf+=k;             // ganzzahlig, keine Nachkommastellen
  if(navigator.vibrate&&!ruhig)navigator.vibrate(8);
  render();
}
function foto(){photoCb=d=>{S.pending.foto=d;render()};$("cam").click()}
function waehleTyp(id){
  S.pending.geraetetyp_id=id||null;
  if(id) S.bekannt[S.pending.code]=id;      // lokal sofort, Server beim Sync
  go("wert");
}
// FR-SCAN-033 (Roadmap #3): Tippfehler-Bremse. Vor dem Speichern bei
// unplausiblem Zählerstand einmal klar nachfragen — fängt den häufigsten
// Fehler ab (eine Ziffer zu viel) und die falsche Richtung im Abbau.
// Kein Verbot: der Monteur kann bestätigen, wenn der Wert doch stimmt.
function unplausibel(v,auf,modus){
  if(modus==="abbau"&&auf!=null){
    if(v<auf) return `Der neue Stand ${fmt(v)} kWh ist kleiner als der Aufbau-Stand ${fmt(auf)} kWh. Ein Zähler zählt normalerweise nur hoch.`;
    if(v-auf>50000) return `Sehr großer Verbrauch: ${fmt(v-auf)} kWh (Aufbau ${fmt(auf)} → jetzt ${fmt(v)}). Eine Ziffer zu viel?`;
  }
  if(v>=1000000) return `Ungewöhnlich hoher Zählerstand: ${fmt(v)} kWh. Eine Ziffer zu viel?`;
  return null;
}
// FR-SCAN-030/031/032: ganze kWh speichern, im Abbau Differenz zum
// Startstand bilden und bei negativer Differenz warnen.
async function uebernehmen(){
  const v=parseInt(S.buf,10); if(isNaN(v))return;
  const auf=refWert(S.pending.code);
  const warn=unplausibel(v,auf,S.cfg.modus);
  if(warn&&!confirm(warn+"\n\nStimmt der Wert wirklich — trotzdem speichern?")) return;
  // Roadmap #6: Foto-Erinnerung/-Pflicht (Stufe kommt vom Büro/Server).
  if(!S.pending.foto){
    const stufe=fotoStufe();
    if(stufe==="pflicht"){ toast("Ohne Foto vom Zähler geht es nicht — Büro-Vorgabe"); return; }
    if(stufe==="hinweis"&&!confirm("Kein Foto vom Zähler.\n\nOhne Beleg speichern?")) return;
  }
  const r={local_id:crypto.randomUUID(),code:S.pending.code,wert:v,foto:S.pending.foto||null,
    geraetetyp_id:S.pending.geraetetyp_id||null,standort:(S.pending.standort||"").trim()||null,
    notiz:(S.pending.notiz||"").trim()||null,
    projekt:S.cfg.projekt,mieter:S.cfg.mieter,modus:S.cfg.modus,status:"pending",ts:Date.now()};
  if(auf!=null){r.auf=auf;r.diff=v-auf}
  S.rows.push(r); await DB.put(r);
  S.pending=null; S.buf="";
  if(r.diff!=null&&r.diff<0) toast("Achtung: Differenz negativ");
  else toast(r.code+" gespeichert");
  go("scan"); syncen();
}
function tippen(){
  const v=prompt("Nummer vom Etikett (12-stellig, ohne Bindestrich)"); if(!v)return;
  const c=v.trim().replace(/\D/g,"");
  if(!/^\d{6,14}$/.test(c)){toast("Das sieht nicht nach einer Etikettennummer aus");return}
  onScan(c);
}

(async()=>{
  try{S.cfg={...S.cfg,...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch(e){}
  S.rows=(await DB.all()).sort((a,b)=>a.ts-b.ts);
  await ladeStammdaten();
  render(); syncen();
})();
/* Parallax: Wasserzeichen und Glut wandern gegenläufig zum Scroll.
   Nur transform, passiver Listener, ein rAF pro Frame. */
(function(){
  if(ruhig) return;
  const wz=document.getElementById("wz"), gl=document.getElementById("glow");
  if(!wz||!gl) return;
  let steht=false;
  addEventListener("scroll",()=>{
    if(steht) return; steht=true;
    requestAnimationFrame(()=>{ steht=false;
      const y=scrollY;
      wz.style.transform="translateY("+(-y*.07)+"px)";
      gl.style.transform="translateY("+(y*.05)+"px)";
    });
  },{passive:true});
})();
window.addEventListener("beforeunload",stopCam);
