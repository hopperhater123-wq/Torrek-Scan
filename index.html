<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FBF9F5">
<meta name="apple-mobile-web-app-title" content="Torrek Scan">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Torrek Scan</title>
<style>
  :root{--papier:#FBF9F5;--tinte:#1C1A17;--grau:#6B6559;--linie:#E2DCD0;--feld:#FFFFFF;
    --sonne:#E8A33D;--gruen:#5FA777;--koralle:#E2574C;--nacht:#14120F;--petrol:#0F7C86;--petrolhell:#3BB6BF}
  /* Dunkelmodus: nur die Flächen-/Text-Token drehen; die Akzente (Bernstein/Grün/
     Koralle/Petrol) tragen in beiden Modi dieselbe Bedeutung und bleiben. */
  :root[data-theme="dark"]{--papier:#15130F;--tinte:#F1EDE5;--grau:#9E968A;--linie:#322D25;--feld:#211E19}
  :root[data-theme="dark"] .banner.red{background:rgba(226,87,76,.14);border-color:rgba(226,87,76,.42);color:#F2B3AC}
  :root[data-theme="dark"] .banner.green{background:rgba(95,167,119,.15);border-color:rgba(95,167,119,.42);color:#A9D9BC}
  :root[data-theme="dark"] .banner.amber{background:rgba(232,163,61,.15);border-color:rgba(232,163,61,.42);color:#F0C88A}
  :root[data-theme="dark"] .row.bad{background:rgba(226,87,76,.12)}
  :root[data-theme="dark"] .net.off{background:rgba(226,87,76,.2);color:#F2B3AC}
  :root[data-theme="dark"] .st.s{background:rgba(95,167,119,.2);color:#A9D9BC}
  :root[data-theme="dark"] .st.e{background:rgba(226,87,76,.2);color:#F2B3AC}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--papier);color:var(--tinte);min-height:100dvh;overscroll-behavior:none;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
  .wrap{max-width:520px;margin:0 auto;padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 20px)}
  .bar{display:flex;align-items:center;gap:9px;padding:14px 2px 12px;border-bottom:1px solid var(--linie);
    position:sticky;top:0;background:var(--papier);z-index:5}
  .crumb{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grau);font-weight:800}
  .back{border:none;background:none;font-size:22px;color:var(--grau);padding:2px 6px 2px 0}
  .pill{margin-left:auto;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 9px;border-radius:99px;background:var(--sonne);color:#3A2A0C}
  .pill.ab{background:var(--gruen);color:#0E2417}
  .net{font-size:10px;font-weight:800;padding:4px 8px;border-radius:99px;background:var(--linie);color:var(--grau)}
  .net.off{background:#FCEBE9;color:#8E2C24}
  .net.q{background:var(--sonne);color:#3A2A0C}
  h1{font-size:25px;font-weight:800;letter-spacing:-.02em;margin:20px 0 6px}
  .sub{font-size:13.5px;color:var(--grau);line-height:1.5;margin-bottom:20px}
  label{display:block;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--grau);margin:0 0 6px}
  input[type=text]{width:100%;padding:13px 14px;border:1.5px solid var(--linie);border-radius:11px;
    font-size:17px;font-family:inherit;background:var(--feld);color:var(--tinte);
    caret-color:var(--petrol);margin-bottom:16px}
  input[type=text]::placeholder{color:var(--grau);opacity:.7}
  input:focus{outline:none;border-color:var(--petrol)}
  button{cursor:pointer;font-family:inherit}
  .seg{display:flex;gap:8px;margin-bottom:22px}
  .seg button{flex:1;padding:14px 6px;border:1.5px solid var(--linie);background:var(--feld);border-radius:11px;
    font-size:15px;font-weight:700;color:var(--grau)}
  .seg button[aria-pressed=true]{background:var(--tinte);border-color:var(--tinte);color:var(--papier)}
  .btn{width:100%;padding:17px;border:none;border-radius:13px;font-size:16.5px;font-weight:800;
    letter-spacing:-.01em;margin-top:9px;display:block;text-align:center}
  .btn.primary{background:var(--tinte);color:var(--papier)}
  .btn.go{background:var(--gruen);color:#fff}
  .btn.ghost{background:none;border:1.5px solid var(--linie);color:var(--grau);padding:14px}
  .btn:disabled{opacity:.4}
  .stage{position:relative;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;margin:12px 0;
    perspective:900px;perspective-origin:50% 38%}
  video{width:100%;height:100%;object-fit:cover;display:block}
  .reticle{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;transform-style:preserve-3d}
  .reticle div{width:82%;height:24%;border:2px solid rgba(255,255,255,.65);border-radius:8px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.28);transform:rotateX(9deg)}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--feld);border:1.5px solid var(--linie);
    border-radius:99px;padding:8px 14px;font-size:15px;font-weight:800;
    font-family:ui-monospace,Menlo,monospace;margin-bottom:14px}
  .dot{width:8px;height:8px;border-radius:99px;background:var(--gruen)}
  .readout{background:var(--nacht);border-radius:16px;padding:18px;margin-bottom:10px;border:2px solid var(--petrolhell);
    perspective:640px;transform-style:preserve-3d}
  .readout .cap{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--petrolhell);
    font-weight:800;margin-bottom:10px}
  .num{font-family:ui-monospace,Menlo,monospace;font-size:46px;font-weight:700;color:#F2EEE6;
    text-align:center;min-height:56px;word-break:break-all}
  .num .cur{color:var(--petrolhell);animation:bl 1s steps(2) infinite}
  @keyframes bl{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.cur{animation:none}}
  .unit{text-align:center;font-size:11px;color:#8C857A;letter-spacing:.2em;font-weight:800;margin-top:2px}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
  .pad button{padding:18px 0;font-size:24px;font-weight:700;font-family:ui-monospace,Menlo,monospace;
    background:var(--feld);border:1.5px solid var(--linie);border-radius:12px;color:var(--tinte)}
  .pad button:active{background:var(--linie)}
  .pad button.fn{font-size:16px;font-family:inherit;font-weight:800;color:var(--grau)}
  .photo{display:flex;align-items:center;gap:12px;border:1.5px dashed var(--linie);border-radius:12px;
    padding:12px;margin-bottom:10px;background:var(--feld)}
  .photo img{width:54px;height:54px;object-fit:cover;border-radius:8px;flex:none;background:var(--linie)}
  .photo.done{border-style:solid;border-color:var(--gruen)}
  .photo .t{font-size:13.5px;font-weight:700}.photo .s{font-size:12px;color:var(--grau);margin-top:2px}
  input[type=file]{display:none}
  .row{display:flex;align-items:center;gap:11px;padding:13px 2px;border-bottom:1px solid var(--linie)}
  .row .idx{font-size:11px;color:#B4AC9E;font-weight:800;width:20px;flex:none}
  .row .id{font-family:ui-monospace,Menlo,monospace;font-size:13.5px;font-weight:700;flex:1;word-break:break-all}
  .row .st{font-size:9px;font-weight:800;padding:2px 6px;border-radius:99px;flex:none}
  .st.p{background:var(--sonne);color:#3A2A0C}.st.s{background:#E6F0E9;color:#2C5D42}
  .st.e{background:#FCEBE9;color:#8E2C24}
  .row .val{font-family:ui-monospace,Menlo,monospace;font-size:14.5px;text-align:right;font-variant-numeric:tabular-nums}
  .row .val small{color:var(--grau);font-size:11px;display:block;font-family:inherit}
  .row.bad{background:#FDF0EE;border-radius:8px;padding:13px 8px;margin:0 -6px}
  .banner{border-radius:12px;padding:13px 14px;font-size:13.5px;line-height:1.5;margin:14px 0}
  .banner.red{background:#FCEBE9;border:1.5px solid #F3C4BF;color:#8E2C24}
  .banner.green{background:#EDF6F0;border:1.5px solid #C3E0CE;color:#2C5D42}
  .banner.amber{background:#FDF4E7;border:1.5px solid #F0DAB4;color:#7A5312}
  .banner b{display:block;margin-bottom:3px}
  .total{background:var(--tinte);color:var(--papier);border-radius:16px;padding:20px;margin:16px 0}
  .total .cap{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9A9186;font-weight:800}
  .total .big{font-family:ui-monospace,Menlo,monospace;font-size:42px;font-weight:700;margin-top:8px;
    font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .total .big span{font-size:15px;color:#9A9186;margin-left:6px}
  .total .note{font-size:12px;color:#9A9186;margin-top:8px;line-height:1.45}
  .meta{font-size:12.5px;color:var(--grau);line-height:1.8;margin:16px 0}
  .meta b{color:var(--tinte)}
  .typen{display:flex;flex-direction:column;gap:8px}
  .typen button{padding:17px 16px;border:1.5px solid var(--linie);background:var(--feld);border-radius:12px;
    font-size:16px;font-weight:700;color:var(--tinte);text-align:left}
  .typen button:active{background:var(--linie)}
  .typen button.unk{color:var(--grau);font-weight:600;border-style:dashed}
  .empty{font-size:13.5px;color:#B4AC9E;text-align:center;padding:26px 0;line-height:1.6}
  .foot{font-size:11px;color:#B4AC9E;text-align:center;margin-top:16px;line-height:1.6}
  .arow{padding:14px 12px;border:1.5px solid var(--linie);border-radius:12px;background:var(--feld);
    margin-bottom:10px;cursor:pointer;transition:transform .14s var(--weich),border-color .2s}
  .arow:active{transform:scale(.99);border-color:var(--petrol)}
  .arow .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .arow .aid{font-family:ui-monospace,Menlo,monospace;font-size:15px;font-weight:800}
  .arow .top .pill{margin-left:auto}
  .arow .ameta{font-size:12.5px;color:var(--grau)}
  .row .id small{display:block;color:var(--grau);font-family:inherit;font-size:11px;font-weight:600;margin-top:1px}
  button:focus-visible,input:focus-visible{outline:3px solid var(--petrol);outline-offset:2px}

  /* ================= Motion ================= */
  :root{--federn:cubic-bezier(.34,1.3,.5,1);--weich:cubic-bezier(.22,.9,.3,1)}

  /* Intro: läuft, während die Kamera aufwacht — kostet also keine Zeit */
  #intro{position:fixed;inset:0;background:var(--nacht);z-index:60;display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:22px;
    perspective:820px;perspective-origin:50% 42%}
  #intro.weg{animation:introWeg .5s var(--weich) forwards}
  @keyframes introWeg{to{opacity:0;transform:scale(1.05);visibility:hidden}}
  .marke{font-size:27px;font-weight:800;letter-spacing:-.03em;color:var(--papier);
    transform-style:preserve-3d;opacity:0;animation:markeAuf .6s var(--weich) .6s forwards;
    text-shadow:0 1px 0 #0b0a08,0 2px 0 #0b0a08,0 6px 15px rgba(0,0,0,.55)}
  .marke span{color:var(--petrolhell);text-shadow:0 1px 0 #06343a,0 0 20px rgba(59,182,191,.55)}
  @keyframes markeAuf{from{opacity:0;transform:translateY(6px) translateZ(-70px) rotateX(-58deg)}
    to{opacity:1;transform:none}}
  .bc{position:relative;display:flex;align-items:flex-end;gap:3px;height:56px}
  .bc i{display:block;width:3px;background:var(--papier);border-radius:1px;transform:scaleY(0);
    transform-origin:bottom;animation:bar .4s var(--federn) forwards}
  .bc i.b{width:6px}
  .laserlinie{position:absolute;left:-14px;right:-14px;height:2px;background:var(--koralle);
    box-shadow:0 0 14px var(--koralle);opacity:0;animation:lz 1.1s var(--weich) .55s}
  @keyframes bar{to{transform:scaleY(1)}}
  @keyframes lz{0%{opacity:0;top:-8px}25%{opacity:1}75%{opacity:1}100%{opacity:0;top:60px}}

  /* Screenwechsel */
  #app>*{animation:rein .34s var(--weich) both}
  @keyframes rein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  #app.zurueck>*{animation:reinR .34s var(--weich) both}
  @keyframes reinR{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

  .back{transition:transform .2s var(--federn)}
  .back:active{transform:translateX(-3px) scale(.9)}
  .pill,.net{transition:background .3s var(--weich),color .3s var(--weich)}
  .net.q{animation:puls 1.6s ease-in-out infinite}
  @keyframes puls{50%{opacity:.55}}
  input[type=text]{transition:border-color .2s var(--weich),box-shadow .2s var(--weich)}
  input[type=text]:focus{box-shadow:0 0 0 4px rgba(15,124,134,.16)}
  .seg button{transition:transform .22s var(--federn),background .22s var(--weich),color .22s,border-color .22s}
  .seg button[aria-pressed=true]{transform:scale(1.02)}
  .seg button:active{transform:scale(.97)}
  .btn{transition:transform .16s var(--weich),box-shadow .22s var(--weich),opacity .2s}
  .btn.primary{box-shadow:0 6px 18px -8px rgba(28,26,23,.6)}
  .btn.go{box-shadow:0 8px 22px -9px rgba(95,167,119,.85)}
  .btn:active:not(:disabled){transform:scale(.975) translateY(1px);box-shadow:0 2px 8px -5px rgba(0,0,0,.5)}

  .stage{box-shadow:0 18px 40px -22px rgba(0,0,0,.7);animation:stageRein .5s var(--weich) both}
  @keyframes stageRein{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  .reticle div{transition:transform .3s var(--federn),border-color .2s}
  .stage.hit .reticle div{transform:rotateX(9deg) scale(.94);border-color:var(--gruen)}
  .scanline{position:absolute;left:12%;right:12%;height:2px;background:var(--koralle);
    box-shadow:0 0 12px var(--koralle),0 0 34px rgba(226,87,76,.55);pointer-events:none;
    transform:translateZ(48px);animation:sweep 2.6s ease-in-out infinite}
  @keyframes sweep{0%,100%{top:40%}50%{top:60%}}

  .chip{animation:chipRein .42s var(--federn) both}
  @keyframes chipRein{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:none}}
  .readout{box-shadow:0 16px 34px -18px rgba(20,18,15,.95),inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 -10px 26px rgba(0,0,0,.45);animation:readRein .5s var(--weich) .04s both}
  @keyframes readRein{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  /* Die Ziffern heben sich aus der vertieften Gerätefläche — Tiefe ohne Kippen (Lesbarkeit bleibt). */
  .num{font-variant-numeric:tabular-nums;transform:translateZ(26px)}
  .num d{display:inline-block;animation:ziffer .18s var(--federn) both}
  @keyframes ziffer{from{opacity:0;transform:translateY(-8px) scale(.7)}to{opacity:1;transform:none}}

  .pad button{border-radius:14px;transition:transform .1s var(--weich),background .12s;
    animation:padRein .3s var(--weich) both;animation-delay:calc(var(--i,0)*16ms)}
  @keyframes padRein{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .pad button:active{transform:scale(.9);background:var(--linie)}

  .photo{transition:border-color .3s var(--weich),transform .16s var(--weich)}
  .photo:active{transform:scale(.985)}
  .photo.done img{animation:fotoRein .45s var(--federn) both}
  @keyframes fotoRein{from{transform:scale(.6) rotate(-6deg)}to{transform:none}}

  .typen button{transition:transform .14s var(--weich),border-color .2s,box-shadow .25s var(--weich);
    animation:rein .34s var(--weich) both;animation-delay:calc(var(--i,0)*38ms)}
  .typen button:active{transform:scale(.98);border-color:var(--sonne);
    box-shadow:0 6px 18px -10px rgba(232,163,61,.9)}

  .row{animation:zeile .3s var(--weich) both;animation-delay:calc(var(--i,0)*26ms)}
  @keyframes zeile{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .row .st{transition:background .3s var(--weich),color .3s}
  .banner{animation:rein .34s var(--weich) both}
  .total{box-shadow:0 20px 44px -24px rgba(28,26,23,.9);animation:totalRein .55s var(--federn) both}
  @keyframes totalRein{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}

  /* Treffer — der einzige Moment, der wirklich Rückmeldung braucht */
  #blitz{position:fixed;inset:0;background:var(--gruen);opacity:0;pointer-events:none;z-index:50}
  #blitz.an{animation:blitz .34s var(--weich)}
  @keyframes blitz{0%{opacity:.34}100%{opacity:0}}
  #toast{position:fixed;left:50%;bottom:26px;background:#1C1A17;color:#FBF9F5;padding:12px 18px;
    border-radius:99px;font-size:14px;font-weight:700;z-index:70;max-width:88%;text-align:center;
    transform:translateX(-50%) translateY(90px);opacity:0;display:block;
    box-shadow:0 12px 30px -12px rgba(0,0,0,.7);
    transition:transform .42s var(--federn),opacity .3s var(--weich)}
  #toast.an{transform:translateX(-50%) translateY(0);opacity:1}

  /* Wer Bewegung abstellt, bekommt keine. Kein Halbweg. */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    #intro{display:none}
  }
</style>
</head>
<body>
<div id="intro"><div class="bc"><div class="laserlinie"></div></div><div class="marke">Torrek <span>Scan</span></div></div>
<div id="blitz"></div>
<div id="toast"></div>

<div class="wrap"><div class="bar" id="bar"></div><div id="app"></div></div>
<input type="file" id="cam" accept="image/*" capture="environment">
<input type="file" id="barcode" accept="image/*" capture="environment">

<!-- Lokal gebündelt statt CDN: die App startet und scannt auch beim ersten Mal offline. -->
<script src="vendor/zxing-0.21.3.min.js"></script>
<script src="vendor/xlsx-0.18.5.full.min.js"></script>
<script>
/* ================= Konfiguration ================= */
const FN  = "https://zkuawtrwtmxhayshuxzv.supabase.co/functions/v1/torrek-scan";
const KEY = "torrek-scan.cfg";
const ruhig = matchMedia("(prefers-reduced-motion: reduce)").matches;

// Service Worker: App-Shell + Libs cachen → offline lauffähig und installierbar.
if("serviceWorker" in navigator)
  addEventListener("load",()=>navigator.serviceWorker.register("sw.js",{updateViaCache:"none"}).catch(()=>{}));

/* ================= Darstellung (Hell/Dunkel) =================
   Voreinstellung „auto" folgt dem System; „light"/"dark" erzwingen. */
const THEMEKEY="torrek-scan.theme";
const themePref=()=>{try{return localStorage.getItem(THEMEKEY)||"auto"}catch(e){return "auto"}};
function applyTheme(){
  const pref=themePref();
  const dunkel = pref==="dark" || (pref==="auto" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.dataset.theme = dunkel?"dark":"light";
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.content = dunkel?"#15130F":"#FBF9F5";
}
function setTheme(p){ try{localStorage.setItem(THEMEKEY,p)}catch(e){} sichereSetupFelder(); applyTheme(); render(); }
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{ if(themePref()==="auto") applyTheme(); });
applyTheme();

(function intro(){
  const bc=document.querySelector(".bc"), el=document.getElementById("intro");
  if(ruhig){ el.remove(); return; }
  [2,1,3,1,1,2,3,1,2,1,1,3,2,1,1,2,3,1,2,2,1,3,1,1,2].forEach((w,i)=>{
    const b=document.createElement("i");
    if(w>2) b.className="b";
    b.style.height=(26+Math.random()*28)+"px";
    b.style.animationDelay=(i*22)+"ms";
    bc.appendChild(b);
  });
  setTimeout(()=>{ el.classList.add("weg"); setTimeout(()=>el.remove(),520); },1700);
})();

/* ================= Offline-Speicher =================
   Erfassung geht IMMER zuerst hierhin. Der Server kommt später.  */
const DB={_p:null};
DB.open=()=>DB._p||(DB._p=new Promise((res,rej)=>{
  const r=indexedDB.open("torrek-scan",1);
  r.onupgradeneeded=()=>{const d=r.result;
    if(!d.objectStoreNames.contains("rows")) d.createObjectStore("rows",{keyPath:"local_id"});
    if(!d.objectStoreNames.contains("cache")) d.createObjectStore("cache",{keyPath:"k"});};
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);}));
const tx=async(store,mode,fn)=>{const d=await DB.open();return new Promise((res,rej)=>{
  const t=d.transaction(store,mode),s=t.objectStore(store);const out=fn(s);
  t.oncomplete=()=>res(out&&out.result!==undefined?out.result:out);t.onerror=()=>rej(t.error);});};
DB.put=(o)=>tx("rows","readwrite",s=>s.put(o));
DB.all=()=>tx("rows","readonly",s=>s.getAll());
DB.del=(id)=>tx("rows","readwrite",s=>s.delete(id));
DB.cput=(k,v)=>tx("cache","readwrite",s=>s.put({k,v}));
DB.cget=async(k)=>{const r=await tx("cache","readonly",s=>s.get(k));return r?r.v:null;};

/* ================= Zustand ================= */
let S={screen:"setup",cfg:{code:"",projekt:"",mieter:"",modus:"aufbau"},
       rows:[],pending:null,buf:"",reader:null,stream:null,offen:[],sync:false,
       typen:[],bekannt:{},zurueck:false,archivSel:null,serverVerlauf:null};
const $=id=>document.getElementById(id), bar=$("bar"), app=$("app");
const fmt=n=>Number(n).toLocaleString("de-DE",{maximumFractionDigits:0});
const esc=s=>String(s??"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
const heute=()=>new Date().toLocaleDateString("de-DE");
// Exakter Zeitpunkt einer Erfassung — auf Tag und Uhrzeit genau, nie „heute".
const wann=ts=>new Date(ts).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const tag=ts=>new Date(ts).toLocaleDateString("de-DE");
// Zähl-Nomen-Kongruenz: 1 Gerät, aber 2 Geräte. Vermeidet „1 Geräte".
const nomen=(n,ein,mehr)=>n===1?ein:mehr;
const meine=()=>S.rows.filter(r=>r.projekt===S.cfg.projekt&&r.modus===S.cfg.modus);
// Alle Erfassungen zu Projekt+Modus (für das Archiv), chronologisch.
const rowsFuer=(p,m)=>S.rows.filter(r=>r.projekt===p&&r.modus===m).sort((a,b)=>a.ts-b.ts);
// Verlauf: alle je erfassten Listen dieses Geräts, gruppiert nach Projekt+Modus.
function archivGruppen(){
  const g={};
  for(const r of S.rows){const k=r.projekt+"|"+r.modus;
    (g[k]||(g[k]={projekt:r.projekt,modus:r.modus,mieter:r.mieter,rows:[]})).rows.push(r);}
  return Object.values(g).map(x=>{const ts=x.rows.map(r=>r.ts);
    x.von=Math.min(...ts); x.bis=Math.max(...ts); x.n=x.rows.length; return x;})
    .sort((a,b)=>b.bis-a.bis);
}

/* ================= Server ================= */
async function ruf(body){
  const r=await fetch(FN,{method:"POST",
    headers:{"Content-Type":"application/json","x-app-code":S.cfg.code},
    body:JSON.stringify(body)});
  const j=await r.json().catch(()=>({fehler:"Antwort unlesbar"}));
  if(!r.ok) throw Object.assign(new Error(j.fehler||("HTTP "+r.status)),{status:r.status,daten:j});
  return j;
}
async function ladeOffen(){
  if(S.cfg.modus!=="abbau"||!navigator.onLine) { S.offen=await DB.cget("offen:"+S.cfg.projekt)||[]; return; }
  try{
    const j=await ruf({aktion:"projekt",projektnummer:S.cfg.projekt});
    S.offen=j.offen||[]; await DB.cput("offen:"+S.cfg.projekt,S.offen);
  }catch(e){ S.offen=await DB.cget("offen:"+S.cfg.projekt)||[]; }
}
// Typenliste + bekannte Geräte cachen, damit die App offline weiß,
// ob ein Barcode neu ist und nach dem Typ gefragt werden muss.
async function ladeStammdaten(){
  S.typen=await DB.cget("typen")||[]; S.bekannt=await DB.cget("bekannt")||{};
  if(!navigator.onLine) return;
  try{
    const j=await ruf({aktion:"stammdaten"});
    S.typen=j.typen||[]; S.bekannt=j.bekannt||{};
    await DB.cput("typen",S.typen); await DB.cput("bekannt",S.bekannt);
  }catch(e){}
}
// FR-SCAN-020/021: nach dem Typ nur beim ersten unbekannten Barcode fragen.
const brauchtTyp=code=>!S.bekannt[code];

// FR-SCAN-040..043: Offline-Queue — pending zuerst lokal, best-effort senden,
// bei 401 (falscher Code) abbrechen, bei „online" automatisch nachholen.
async function syncen(){
  if(S.sync||!navigator.onLine) return;
  S.sync=true; render();
  for(const r of S.rows.filter(x=>x.status!=="synced")){
    try{
      const j=await ruf({aktion:"erfassen",code:r.code,projektnummer:r.projekt,mieter:r.mieter,
        modus:r.modus,kwh:r.wert,foto:r.foto||null,local_id:r.local_id,
        typ_id:r.geraetetyp_id||null,standort:r.standort||null});
      r.status="synced"; r.fehler=null; r.neu=j.geraet_neu_angelegt||false;
      if(j.differenz!=null) r.diff=j.differenz;
      r.foto=null;                       // nach dem Hochladen Platz freigeben
      if(r.geraetetyp_id){ S.bekannt[r.code]=r.geraetetyp_id; await DB.cput("bekannt",S.bekannt); }
      await DB.put(r);
    }catch(e){
      r.status="error"; r.fehler=e.message; await DB.put(r);
      if(e.status===401) break;          // falscher Code: gar nicht erst weiterrennen
    }
  }
  S.sync=false; render();
}
window.addEventListener("online",()=>syncen());

/* ================= Kamera ================= */
function hints(){const h=new Map(), F=ZXing.BarcodeFormat;
  // Mehrere 1D-Symbologien zulassen — Geräte-Etiketten sind nicht immer CODE-128.
  // Der onScan-Filter (nur 6–14 Ziffern) hält Fehltreffer draußen.
  h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [F.CODE_128,F.CODE_39,F.CODE_93,F.ITF,F.CODABAR,F.EAN_13,F.EAN_8,F.UPC_A,F.UPC_E]);
  h.set(ZXing.DecodeHintType.TRY_HARDER,true);return h;}
// Vor dem Foto-Lesen die Live-Kamera stoppen — sonst laufen Kamera UND
// Foto-Dekodierung gleichzeitig und sprengen den Speicher.
function fotoScan(){stopCam();$("barcode").click();}
function stopCam(){try{S.reader&&S.reader.reset()}catch(e){}
  if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null}S.reader=null;}
async function startCam(){
  try{
    // Standard-Auflösung (kein Zwang) — schont Speicher auf schwächeren Handys.
    S.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
    // Dauerfokus anfordern, wo unterstützt (kostet keinen Speicher).
    try{const tr=S.stream.getVideoTracks()[0], caps=tr.getCapabilities&&tr.getCapabilities();
      if(caps&&caps.focusMode&&caps.focusMode.includes("continuous"))
        await tr.applyConstraints({advanced:[{focusMode:"continuous"}]});}catch(e){}
    const v=$("v"); v.srcObject=S.stream; await v.play();
    S.reader=new ZXing.BrowserMultiFormatReader(hints());
    S.reader.decodeFromVideoElement(v,r=>{if(r)onScan(r.getText())});
  }catch(e){ $("camerr").innerHTML=`<div class="banner red"><b>Kamera geht nicht (${esc(e.name)})</b>
    Aus WhatsApp/Mail geöffnet? Link in Safari oder Chrome öffnen. Sonst unten eintippen.</div>`; }
}
// Barcode aus einem Foto lesen — robuster als Live-Kamera bei schwierigen Etiketten.
// SPEICHERSPARSAM: mit createImageBitmap direkt verkleinert dekodieren (kein
// Voll-Megapixel-Bitmap), Kamera ist vorher gestoppt. Sonst stürzt die App ab.
async function barcodeAusBild(f){
  if(!f) return;
  toast("Foto wird gelesen …");
  try{
    const cap=1000;
    let src=null;
    try{ src=await createImageBitmap(f,{resizeWidth:cap,resizeQuality:"medium"}); }catch(e){}
    if(!src){                                   // Fallback ohne createImageBitmap-Resize
      const img=new Image(), url=URL.createObjectURL(f);
      await new Promise((res,rej)=>{img.onload=res;img.onerror=()=>rej(0);img.src=url;});
      URL.revokeObjectURL(url); src=img;
    }
    const sw=src.width||src.naturalWidth, sh=src.height||src.naturalHeight;
    const sc=Math.min(1,cap/Math.max(sw,sh));
    const cv=document.createElement("canvas");
    cv.width=Math.max(1,Math.round(sw*sc)); cv.height=Math.max(1,Math.round(sh*sc));
    cv.getContext("2d").drawImage(src,0,0,cv.width,cv.height);
    src.close&&src.close();
    const durl=cv.toDataURL("image/jpeg",0.85);
    const r=await new ZXing.BrowserMultiFormatReader(hints()).decodeFromImageUrl(durl).catch(()=>null);
    if(r&&r.getText()){ onScan(r.getText()); return; }
    toast("Kein Barcode erkannt — gerade, nah, gutes Licht");
  }catch(e){ toast("Foto konnte nicht gelesen werden"); }
  if(S.screen==="scan") render();               // Live-Kamera wieder starten
}
// FR-SCAN-010/012/013: nur CODE-128-Ziffern übernehmen, keine Doppel,
// im Abbau nur Geräte, die zu diesem Projekt gehören.
function onScan(code){
  if(S.pending||!/^\d{6,14}$/.test(code)) return;
  if(meine().some(r=>r.code===code)){toast("Schon erfasst: "+code);return}
  if(S.cfg.modus==="abbau"&&S.offen.length&&!S.offen.some(o=>o.geraet_inventarnummer===code)){
    toast("Gehört nicht zu diesem Projekt"); return;
  }
  treffer(); stopCam(); S.pending={code}; S.buf="";
  // Typ nur fragen, wenn er noch fehlt — bei bekannten Geräten passiert gar nichts.
  setTimeout(()=>{ S.screen = brauchtTyp(code) ? "typ" : "wert"; render(); }, ruhig?0:170);
}
function treffer(){
  const b=document.getElementById("blitz"), st=document.querySelector(".stage");
  if(!ruhig){
    b.classList.remove("an"); void b.offsetWidth; b.classList.add("an");
    if(st){ st.classList.add("hit"); setTimeout(()=>st.classList.remove("hit"),320); }
  }
  if(navigator.vibrate) navigator.vibrate([28,40,18]);
}
let tt=null;
function toast(m){
  const e=document.getElementById("toast"); clearTimeout(tt);
  e.textContent=m; e.classList.add("an");
  tt=setTimeout(()=>e.classList.remove("an"),2400);
}

/* ================= Foto ================= */
let photoCb=null;
$("cam").onchange=async ev=>{const f=ev.target.files[0];ev.target.value="";
  if(f&&photoCb) photoCb(await shrink(f));};
$("barcode").onchange=async ev=>{const f=ev.target.files[0];ev.target.value="";await barcodeAusBild(f);};
const shrink=file=>new Promise(res=>{const img=new Image(),u=URL.createObjectURL(file);
  img.onload=()=>{const m=1200,sc=Math.min(1,m/Math.max(img.width,img.height));
    const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(u);
    res(c.toDataURL("image/jpeg",0.7))};img.src=u;});

/* ================= Excel ================= */
// Parameterisiert nach Projekt+Modus, damit auch archivierte Listen exportierbar
// sind. Datum je Zeile = echter Erfassungs-Tag (r.ts), nicht „heute".
function wbFuer(projekt,modus,mieter){
  const ab=modus==="abbau", rows=rowsFuer(projekt,modus);
  const listenTag=rows.length?tag(rows[0].ts):heute();
  const a=[["Geräteliste – Bautrocknung"],["Projektnummer:",projekt],["Datum:",listenTag],
           ["Mieter:",mieter],[]];
  a.push(ab?["Nr.","Gerät","Standort","Datum","Mieter","kWh Auf","kWh Ab","Differenz"]
           :["Nr.","Gerät","Standort","Datum","Mieter","kWh","Auf","Ab"]);
  rows.forEach((r,i)=>a.push(ab?[i+1,r.code,r.standort||"",tag(r.ts),mieter,r.auf??"",r.wert,r.diff??""]
                              :[i+1,r.code,r.standort||"",tag(r.ts),mieter,r.wert,"X",""]));
  if(ab){const s=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
    a.push([]);a.push(["","","","","","Gesamtverbrauch",+s.toFixed(2),"kWh"]);}
  const ws=XLSX.utils.aoa_to_sheet(a);
  ws["!cols"]=[{wch:5},{wch:16},{wch:16},{wch:12},{wch:14},{wch:11},{wch:11},{wch:11}];
  const b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,ws,"Geräteliste");return b;
}
const wb=()=>wbFuer(S.cfg.projekt,S.cfg.modus,S.cfg.mieter);
const fnameFuer=(projekt,modus)=>`Geraeteliste_${String(projekt).replace(/\s+/g,"")}_${modus==="abbau"?"Abbau":"Aufbau"}.xlsx`;
// FR-SCAN-050/052: Excel als Zettel fürs Büro — teilen, sonst Download.
async function sendenFuer(projekt,modus,mieter){
  const ab=modus==="abbau", rows=rowsFuer(projekt,modus);
  const sum=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
  const listenTag=rows.length?tag(rows[0].ts):heute();
  const betreff=`Geräteliste ${projekt} — ${ab?"Abbau":"Aufbau"} ${listenTag}`;
  const text=`Projekt: ${projekt}\nMieter: ${mieter}\nGeräte: ${rows.length}\n`+
    (ab?`Gesamtverbrauch: ${fmt(+sum.toFixed(2))} kWh\n`:"");
  try{
    const out=XLSX.write(wbFuer(projekt,modus,mieter),{bookType:"xlsx",type:"array"});
    const file=new File([out],fnameFuer(projekt,modus),{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    if(navigator.canShare&&navigator.canShare({files:[file]}))
      return void await navigator.share({files:[file],title:betreff,text});
  }catch(e){}
  XLSX.writeFile(wbFuer(projekt,modus,mieter),fnameFuer(projekt,modus));
}
async function senden(){ return sendenFuer(S.cfg.projekt,S.cfg.modus,S.cfg.mieter); }

function zaehlHoch(el,ziel){
  if(!el) return;
  if(ruhig){ el.firstChild.textContent=fmt(ziel); return; }
  const t0=performance.now(), dauer=760;
  const lauf=t=>{ const p=Math.min(1,(t-t0)/dauer), e=1-Math.pow(1-p,3);
    el.firstChild.textContent=fmt(Math.round(ziel*e));
    if(p<1) requestAnimationFrame(lauf); };
  requestAnimationFrame(lauf);
}

/* ================= Screens ================= */

  const ab=S.cfg.modus==="abbau", rows=meine();
  const offenN=S.rows.filter(r=>r.status!=="synced").length;
  const netz=!navigator.onLine?`<span class="net off">offline</span>`

  const pill=`<span class="pill ${ab?"ab":""}">${ab?"Abbau":"Aufbau"}</span>`;
  app.classList.toggle("zurueck",S.zurueck); S.zurueck=false;

  if(S.screen==="setup"){
    bar.innerHTML=`<span class="crumb">Torrek Scan</span>${netz}`;
    app.innerHTML=`<h1>Neue Liste</h1>
      <p class="sub">Einmal ausfüllen, gilt für alle Geräte.</p>
      <label>Zugangscode</label><input type="text" id="c" value="${esc(S.cfg.code)}" placeholder="vom Büro">
      <label>Projektnummer</label><input type="text" id="p" value="${esc(S.cfg.projekt)}" placeholder="2026 033996">
      <label>Mieter</label><input type="text" id="m" value="${esc(S.cfg.mieter)}" placeholder="Wimmer">
      <label>Was machst du heute?</label>
      <div class="seg">
        <button aria-pressed="${!ab}" onclick="setModus('aufbau')">Aufbau</button>
        <button aria-pressed="${ab}" onclick="setModus('abbau')">Abbau</button></div>
      <label>Darstellung</label>
      <div class="seg">
        <button aria-pressed="${themePref()==='auto'}" onclick="setTheme('auto')">Auto</button>
        <button aria-pressed="${themePref()==='light'}" onclick="setTheme('light')">Hell</button>
        <button aria-pressed="${themePref()==='dark'}" onclick="setTheme('dark')">Dunkel</button></div>
      <button class="btn primary" onclick="los()">Loslegen</button>
      ${S.rows.length?`<button class="btn ghost" onclick="go('archiv')">Frühere Listen ansehen</button>`:""}
      ${offenN?`<p class="foot">${offenN} ${nomen(offenN,"Erfassung wartet","Erfassungen warten")} noch aufs Senden.</p>`:""}`;
    return;
  }

  if(S.screen==="archiv"){
    bar.innerHTML=`<button class="back" onclick="zurueck('setup')">‹</button><span class="crumb">Frühere Listen</span>`;
    const gr=archivGruppen();
    app.innerHTML=`<h1 style="font-size:22px">Frühere Listen</h1>
      <p class="sub">Alles, was auf diesem Gerät erfasst wurde — auch abgeschlossene. Projektnummer eintippen zum Filtern.</p>
      <input type="text" id="archivsuche" placeholder="Projektnummer suchen" oninput="filterArchiv(this.value)">
      <button class="btn ghost" style="margin-top:2px" onclick="serverSuche()">Diese Nummer im Büro-Archiv suchen</button>
      <p class="foot" style="margin:8px 0 4px">Büro-Archiv = geräteübergreifend vom Server (braucht Netz).</p>
      ${gr.length?`<div id="archivliste">`+gr.map(x=>`
        <div class="arow" data-p="${esc(x.projekt)}" onclick="oeffneArchiv('${esc(x.projekt)}','${x.modus}')">
          <div class="top"><span class="aid">${esc(x.projekt)}</span>
            <span class="pill ${x.modus==='abbau'?'ab':''}">${x.modus==='abbau'?'Abbau':'Aufbau'}</span></div>
          <div class="ameta">${esc(x.mieter||'—')} · ${x.n} ${nomen(x.n,'Gerät','Geräte')} · ${tag(x.von)}${tag(x.von)!==tag(x.bis)?' – '+tag(x.bis):''}</div>
        </div>`).join("")+`</div>`
        :`<p class="empty">Auf diesem Gerät wurde noch nichts erfasst.</p>`}`;
    return;
  }

  if(S.screen==="archivDetail"){
    const sel=S.archivSel||{}, av=sel.modus==="abbau", rows=rowsFuer(sel.projekt,sel.modus);
    bar.innerHTML=`<button class="back" onclick="zurueck('archiv')">‹</button>
      <span class="crumb">${esc(sel.projekt)}</span><span class="pill ${av?"ab":""}">${av?"Abbau":"Aufbau"}</span>`;
    const sum=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
    const vonTag=rows.length?tag(rows[0].ts):"—", bisTag=rows.length?tag(rows[rows.length-1].ts):"—";
    app.innerHTML=`
      <p class="meta"><b>Projekt</b> ${esc(sel.projekt)}<br><b>Mieter</b> ${esc(sel.mieter||'—')}<br>
        <b>Erfasst</b> ${vonTag}${vonTag!==bisTag?' – '+bisTag:''}<br><b>Geräte</b> ${rows.length}</p>
      ${av?`<div class="total"><div class="cap">Verbrauch gesamt</div>
        <div class="big">${fmt(+sum.toFixed(2))}<span>kWh</span></div></div>`:""}
      ${rows.map((r,i)=>`<div class="row ${r.diff!=null&&r.diff<0?"bad":""}" style="--i:${i}">
        <span class="idx">${i+1}</span>
        <span class="id">${esc(r.code)}<small>${wann(r.ts)}${r.standort?" · "+esc(r.standort):""}</small></span>
        <span class="st ${r.status==="synced"?"s":r.status==="error"?"e":"p"}">${
          r.status==="synced"?"↑":r.status==="error"?"!":"…"}</span>
        <span class="val">${av&&r.diff!=null?fmt(r.diff):fmt(r.wert)}
          <small>${av&&r.diff!=null?"Differenz":"kWh"}</small></span></div>`).join("")}
      <button class="btn primary" onclick="exportArchiv()">Excel erneut erzeugen</button>`;
    return;
  }

  if(S.screen==="serverArchiv"){
    const v=S.serverVerlauf||{erfassungen:[]}, es=v.erfassungen||[];
    bar.innerHTML=`<button class="back" onclick="zurueck('archiv')">‹</button>
      <span class="crumb">${esc(v.projektnummer||"")}</span><span class="net q">Büro-Archiv</span>`;
    const auf=es.filter(r=>r.modus==="aufbau"), ab=es.filter(r=>r.modus==="abbau");
    const sum=ab.reduce((x,r)=>x+(Number(r.differenz)||0),0);
    const block=(titel,list,istAb)=>list.length?`<h1 style="font-size:16px;margin:16px 0 2px">${titel}</h1>`+

        <span class="idx">${i+1}</span>
        <span class="id">${esc(r.code)}<small>${wann(r.erfasst_am)}${r.standort?" · "+esc(r.standort):""}${r.typ?" · "+esc(r.typ):""}</small></span>
        <span class="val">${istAb&&r.differenz!=null?fmt(r.differenz):fmt(r.kwh)}
          <small>${istAb&&r.differenz!=null?"Differenz":"kWh"}</small></span></div>`).join(""):"";
    app.innerHTML=`
      <p class="sub">Alle Erfassungen zu dieser Projektnummer — geräteübergreifend aus dem Büro-Archiv (Server).</p>
      ${es.length?"":`<p class="empty">Keine Einträge zu dieser Nummer gefunden.</p>`}
      ${ab.length?`<div class="total"><div class="cap">Verbrauch gesamt (Abbau)</div>
        <div class="big">${fmt(+sum.toFixed(2))}<span>kWh</span></div></div>`:""}
      ${block("Aufbau",auf,false)}
      ${block("Abbau",ab,true)}

    return;
  }

  if(S.screen==="scan"){
    bar.innerHTML=`<button class="back" onclick="zurueck('liste')">‹</button>
      <span class="crumb">${esc(S.cfg.projekt)}</span>${pill}${netz}`;
    const fehlt=fehlende();
    app.innerHTML=`
      <div class="stage"><video id="v" playsinline muted autoplay></video>
        <div class="scanline"></div><div class="reticle"><div></div></div></div>
      <div id="camerr"></div>
      <p class="sub" style="text-align:center;margin:2px 0 8px">
        <b style="color:var(--tinte);font-size:19px">${rows.length}</b> erfasst${
        ab&&fehlt.length?` · <span style="color:var(--koralle)">${fehlt.length} ${nomen(fehlt.length,"fehlt","fehlen")}</span>`:""}</p>
      <button class="btn ghost" onclick="fotoScan()">Barcode vom Foto einlesen</button>
      <button class="btn ghost" onclick="tippen()">Nummer eintippen</button>
      <button class="btn primary" onclick="go('liste')">Liste (${rows.length})</button>`;
    startCam(); return;
  }

  if(S.screen==="typ"){
    const hatTypen=S.typen.length>0;
    bar.innerHTML=`<button class="back" onclick="S.pending=null;zurueck('scan')">‹</button>
      <span class="crumb">Neues Gerät</span>${pill}`;
    // Leerzustand: ist die Typenliste (noch) nicht geladen — typischer Offline-Fall —
    // führen wir statt einer leeren Auswahl klar zum Weiter-ohne-Typ.
    app.innerHTML=`<span class="chip"><span class="dot" style="background:var(--petrol)"></span>${esc(S.pending.code)}</span>
      <h1 style="font-size:21px">Was ist das für ein Gerät?</h1>
      <p class="sub" style="margin-bottom:16px">${hatTypen
        ? "Steht noch nicht im Bestand. Einmal antippen — beim nächsten Mal fragt die App nicht mehr."
        : "Steht noch nicht im Bestand."}</p>
      ${hatTypen?"":`<div class="banner amber"><b>Geräteliste nicht geladen</b>
        Wahrscheinlich offline. Du kannst ohne Typ weiter — das Büro ergänzt ihn später.</div>`}
      <div class="typen">
        ${S.typen.map((t,i)=>`<button style="--i:${i}" onclick="waehleTyp('${t.id}')">${esc(t.bezeichnung)}</button>`).join("")}
        <button class="unk" style="--i:${S.typen.length}" onclick="waehleTyp('')">${
          hatTypen?"Weiß ich nicht — später":"Ohne Typ weiter"}</button>
      </div>`;
    return;
  }

  if(S.screen==="wert"){
    bar.innerHTML=`<button class="back" onclick="S.pending=null;zurueck('scan')">‹</button>
      <span class="crumb">Zählerstand</span>${pill}`;
    const auf=refWert(S.pending.code);
    app.innerHTML=`<span class="chip"><span class="dot"></span>${esc(S.pending.code)}</span>
      ${auf!=null?`<div class="banner amber"><b>Aufbau-Stand: ${fmt(auf)} kWh</b>
        Der jetzige Stand muss größer sein.</div>`:""}
      <div class="readout"><div class="cap">Zählerstand — nur ganze kWh</div>
        <div class="num">${S.buf?ziffern(S.buf):"<span class='cur'>0</span>"}</div><div class="unit">K W H</div></div>
      <div class="pad">${[1,2,3,4,5,6,7,8,9].map((n,i)=>`<button style="--i:${i}" onclick="key('${n}')">${n}</button>`).join("")}
        <button class="fn" style="--i:9" onclick="key('C')">C</button>
        <button style="--i:10" onclick="key('0')">0</button>
        <button class="fn" style="--i:11" onclick="key('<')">←</button></div>
      <div class="photo ${S.pending.foto?"done":""}" role="button" tabindex="0"
        aria-label="${S.pending.foto?"Foto vom Zähler neu aufnehmen":"Foto vom Zähler aufnehmen"}"
        onclick="foto()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();foto()}">
        ${S.pending.foto?`<img src="${S.pending.foto}" alt="">`:`<img alt="">`}
        <div><div class="t">${S.pending.foto?"Foto vom Zähler ✓":"Foto vom Zähler"}</div>
        <div class="s">${S.pending.foto?"Antippen zum Neu-Aufnehmen":"Beleg fürs Büro"}</div></div></div>
      ${!ab?`<label style="margin-top:2px">Standort (optional)</label>
        <input type="text" value="${esc(S.pending.standort||"")}" placeholder="z. B. Keller links, EG Bad"
          oninput="S.pending.standort=this.value">`:""}
      <button class="btn go" onclick="uebernehmen()" ${S.buf?"":"disabled"}>Speichern — nächstes Gerät</button>`;
    return;
  }

  if(S.screen==="liste"){
    bar.innerHTML=`<button class="back" onclick="zurueck('scan')">‹</button>
      <span class="crumb">${rows.length} ${nomen(rows.length,"Gerät","Geräte")}</span>${pill}${netz}`;
    const fehlt=fehlende(), bad=rows.filter(r=>r.diff!=null&&r.diff<0);
    const err=rows.filter(r=>r.status==="error");
    app.innerHTML=`
      ${fehlt.length?`<div class="banner red"><b>${fehlt.length} ${nomen(fehlt.length,"Gerät","Geräte")} noch nicht abgebaut</b>
        ${fehlt.slice(0,5).map(fehltLabel).join(", ")}${fehlt.length>5?" …":""}</div>`:""}
      ${bad.length?`<div class="banner red"><b>Negative Differenz</b>
        ${bad.map(r=>esc(r.code)).join(", ")} — Zähler übergelaufen oder vertippt.</div>`:""}
      ${err.length?`<div class="banner red"><b>${err.length} nicht gesendet</b>
        ${esc(err[0].fehler||"")}</div>`:""}
      ${rows.length?rows.map((r,i)=>`<div class="row ${r.diff!=null&&r.diff<0?"bad":""}" style="--i:${i}">
        <span class="idx">${i+1}</span><span class="id">${esc(r.code)}</span>
        <span class="st ${r.status==="synced"?"s":r.status==="error"?"e":"p"}">${
          r.status==="synced"?"↑":r.status==="error"?"!":"…"}</span>
        <span class="val">${ab&&r.diff!=null?fmt(r.diff):fmt(r.wert)}
          <small>${ab&&r.diff!=null?"Differenz":"kWh"}</small></span></div>`).join("")
        :`<p class="empty">Noch nichts gescannt.</p>`}
      <button class="btn go" onclick="go('scan')">Weiter scannen</button>
      <button class="btn primary" onclick="go('senden')" ${rows.length?"":"disabled"}>Abschließen</button>
      ${S.rows.some(r=>r.status!=="synced")?`<button class="btn ghost" onclick="syncen()">Jetzt senden</button>`:""}`;
    return;
  }

  if(S.screen==="senden"){
    bar.innerHTML=`<button class="back" onclick="zurueck('liste')">‹</button>
      <span class="crumb">Abschließen</span>${pill}${netz}`;
    const fehlt=fehlende(), sum=rows.reduce((x,r)=>x+(Number(r.diff)||0),0);
    const neu=rows.filter(r=>r.neu).length, offenX=rows.filter(r=>r.status!=="synced").length;
    app.innerHTML=`
      ${ab?`<div class="total"><div class="cap">Verbrauch gesamt</div>
        <div class="big" id="sum">0<span>kWh</span></div>
        <div class="note">Aus ${rows.length} ${nomen(rows.length,"Gerät","Geräten")}. Das ist die Zahl für den Strombrief.</div></div>`
      :`<div class="banner green"><b>Aufbau-Liste steht</b>
        ${rows.length} Startstände. Beim Abbau rechnet die App die Differenz.</div>`}
      ${offenX?`<div class="banner amber"><b>${offenX} noch nicht gesendet</b>
        Sie liegen sicher auf dem Handy und gehen raus, sobald Netz da ist.</div>`
      :`<div class="banner green"><b>Alles gesichert</b> Nichts geht mehr verloren —
        auch nicht, wenn das Handy wegkommt.</div>`}
      ${fehlt.length?`<div class="banner red"><b>${fehlt.length} ${nomen(fehlt.length,"Gerät fehlt","Geräte fehlen")} — Summe unvollständig</b>
        ${fehlt.slice(0,5).map(fehltLabel).join(", ")}</div>`:""}
      ${neu?`<div class="banner amber"><b>${neu} ${nomen(neu,"neues Gerät","neue Geräte")}</b>
        ${nomen(neu,"Stand","Standen")} noch nicht im Bestand.</div>`:""}
      <p class="meta"><b>Projekt</b> ${esc(S.cfg.projekt)}<br><b>Mieter</b> ${esc(S.cfg.mieter)}<br>
        <b>Datum</b> ${heute()}<br><b>Geräte</b> ${rows.length}</p>
      <button class="btn go" onclick="senden()">Excel erzeugen und ans Büro</button>
      <button class="btn ghost" onclick="go('setup')">Neue Liste</button>
      <p class="foot">Torrek Scan speichert getrennt von Torrek.<br>Die Excel ist der Zettel fürs Büro.</p>`;
    if(ab) zaehlHoch(document.getElementById("sum"),sum);
  }
}

/* ================= Aktionen ================= */
// Vor jedem Re-Render des Setups die bereits getippten Felder sichern —
// sonst löscht ein Umschalten (Modus/Darstellung) Code/Projekt/Mieter.
function sichereSetupFelder(){const c=$("c"),p=$("p"),mm=$("m");
  if(c)S.cfg.code=c.value; if(p)S.cfg.projekt=p.value; if(mm)S.cfg.mieter=mm.value;}
function setModus(m){sichereSetupFelder();S.cfg.modus=m;render();}
function go(s){stopCam();S.screen=s;render()}
function zurueck(s){S.zurueck=true;go(s)}
// Archiv: eine frühere Liste öffnen, live filtern (ohne Re-Render), erneut exportieren.
function oeffneArchiv(p,m){const g=archivGruppen().find(x=>x.projekt===p&&x.modus===m);
  S.archivSel={projekt:p,modus:m,mieter:g?g.mieter:""};go("archivDetail");}
function filterArchiv(q){q=(q||"").toLowerCase();
  document.querySelectorAll("#archivliste .arow").forEach(el=>{
    el.style.display=el.dataset.p.toLowerCase().includes(q)?"":"none";});}
function exportArchiv(){const s=S.archivSel;if(s)sendenFuer(s.projekt,s.modus,s.mieter);}
// Büro-Archiv: Projektnummer geräteübergreifend am Server nachschlagen (aktion "verlauf").
async function serverSuche(){
  const q=($("archivsuche")?.value||"").trim();
  if(!q){toast("Erst eine Projektnummer eintippen");return}
  if(!navigator.onLine){toast("Fürs Büro-Archiv brauchst du Netz");return}
  toast("Suche im Büro-Archiv …");
  try{
    const j=await ruf({aktion:"verlauf",projektnummer:q});
    S.serverVerlauf={projektnummer:q,erfassungen:j.erfassungen||[]};
    go("serverArchiv");
  }catch(e){
    if(e.status===401) toast("Zugangscode fehlt oder falsch (im Setup prüfen)");
    else if(e.status===400) toast("Server kennt die Archiv-Suche noch nicht");
    else toast(e.message||"Suche fehlgeschlagen");
  }
}
function exportServer(){
  const v=S.serverVerlauf; if(!v||!v.erfassungen.length)return;
  const es=v.erfassungen, mieter=(es.find(r=>r.mieter)||{}).mieter||"";
  const a=[["Büro-Archiv – Bautrocknung"],["Projektnummer:",v.projektnummer],["Mieter:",mieter],
           ["Erzeugt:",wann(Date.now())],[]];
  a.push(["Nr.","Gerät","Standort","Modus","Datum/Uhrzeit","kWh","Differenz","Gerätetyp"]);
  es.forEach((r,i)=>a.push([i+1,r.code,r.standort||"",r.modus,wann(r.erfasst_am),r.kwh,r.differenz??"",r.typ||""]));
  const ab=es.filter(r=>r.modus==="abbau");
  if(ab.length){const s=ab.reduce((x,r)=>x+(Number(r.differenz)||0),0);
    a.push([]);a.push(["","","","","","Gesamtverbrauch",+s.toFixed(2),"kWh"]);}
  const ws=XLSX.utils.aoa_to_sheet(a);
  ws["!cols"]=[{wch:5},{wch:16},{wch:16},{wch:9},{wch:18},{wch:10},{wch:11},{wch:18}];
  const b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,ws,"Büro-Archiv");
  const fn=`Buero-Archiv_${String(v.projektnummer).replace(/\s+/g,"")}.xlsx`;
  try{const out=XLSX.write(b,{bookType:"xlsx",type:"array"});
    const file=new File([out],fn,{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    if(navigator.canShare&&navigator.canShare({files:[file]}))
      return void navigator.share({files:[file],title:"Büro-Archiv "+v.projektnummer});}catch(e){}
  XLSX.writeFile(b,fn);
}
// FR-SCAN-001/002: Setup einmal ausfüllen; ohne Code/Projekt kein Start.
async function los(){
  S.cfg.code=$("c").value.trim(); S.cfg.projekt=$("p").value.trim(); S.cfg.mieter=$("m").value.trim();
  if(!S.cfg.code||!S.cfg.projekt){toast("Code und Projektnummer fehlen");return}
  localStorage.setItem(KEY,JSON.stringify(S.cfg));
  await ladeStammdaten();
  await ladeOffen();
  if(S.cfg.modus==="abbau"&&!S.offen.length&&navigator.onLine)
    toast("Kein offener Aufbau zu diesem Projekt");
  go("scan");
}
function refWert(code){const o=S.offen.find(x=>x.geraet_inventarnummer===code);
  return o?Number(o.zaehlerstand_start):null;}
// Standort eines (offenen) Geräts, vom Server geladen — für die „Gerät vergessen"-Warnung.
function standortVon(code){const o=S.offen.find(x=>x.geraet_inventarnummer===code);return o&&o.standort||"";}
const fehltLabel=c=>esc(c)+(standortVon(c)?` (${esc(standortVon(c))})`:"");
function fehlende(){if(S.cfg.modus!=="abbau")return[];
  const da=meine().map(r=>r.code);
  return S.offen.map(o=>o.geraet_inventarnummer).filter(c=>!da.includes(c));}
function ziffern(s){return s.split("").map(c=>`<d>${c}</d>`).join("")}
function key(k){
  if(k==="<")S.buf=S.buf.slice(0,-1);
  else if(k==="C")S.buf="";
  else if(S.buf.length<9)S.buf+=k;             // ganzzahlig, keine Nachkommastellen
  if(navigator.vibrate&&!ruhig)navigator.vibrate(8);
  render();
}
function foto(){photoCb=d=>{S.pending.foto=d;render()};$("cam").click()}
function waehleTyp(id){
  S.pending.geraetetyp_id=id||null;
  if(id) S.bekannt[S.pending.code]=id;      // lokal sofort, Server beim Sync
  go("wert");
}
// FR-SCAN-030/031/032: ganze kWh speichern, im Abbau Differenz zum
// Startstand bilden und bei negativer Differenz warnen.
async function uebernehmen(){
  const v=parseInt(S.buf,10); if(isNaN(v))return;
  const auf=refWert(S.pending.code);
  const r={local_id:crypto.randomUUID(),code:S.pending.code,wert:v,foto:S.pending.foto||null,
    geraetetyp_id:S.pending.geraetetyp_id||null,standort:(S.pending.standort||"").trim()||null,
    projekt:S.cfg.projekt,mieter:S.cfg.mieter,modus:S.cfg.modus,status:"pending",ts:Date.now()};
  if(auf!=null){r.auf=auf;r.diff=v-auf}
  S.rows.push(r); await DB.put(r);
  S.pending=null; S.buf="";
  if(r.diff!=null&&r.diff<0) toast("Achtung: Differenz negativ");
  else toast(r.code+" gespeichert");
  go("scan"); syncen();
}
function tippen(){
  const v=prompt("Nummer vom Etikett (12-stellig, ohne Bindestrich)"); if(!v)return;
  const c=v.trim().replace(/\D/g,"");
  if(!/^\d{6,14}$/.test(c)){toast("Das sieht nicht nach einer Etikettennummer aus");return}
  onScan(c);
}

/* ================= Start ================= */
(async()=>{
  try{S.cfg={...S.cfg,...JSON.parse(localStorage.getItem(KEY)||"{}")}}catch(e){}
  S.rows=(await DB.all()).sort((a,b)=>a.ts-b.ts);
  await ladeStammdaten();
  render(); syncen();
})();
window.addEventListener("beforeunload",stopCam);
</script>
