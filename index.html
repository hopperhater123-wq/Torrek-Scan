<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Einbindung von modernen Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- SIDEBAR (Navigation & Filter) -->
        <aside class="sidebar">
            <div class="logo">Studio.</div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="nav-icon">📁</span> Alle Listen
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">💻</span> Geräte
                </a>
                <a href="#" class="nav-item trash-nav">
                    <span class="nav-icon">🗑️</span> Papierkorb <span class="badge">3</span>
                </a>
            </nav>
            
            <button class="btn-primary">+ Neue Liste</button>
        </aside>

        <!-- MAIN CONTENT (Deine Listen) -->
        <main class="main-content">
            <header class="main-header">
                <div>
                    <h1>Deine Listen</h1>
                    <p class="subtitle">Organisiere deine Geräte und Aufgaben im Handumdrehen.</p>
                </div>
                <div class="user-profile">JS</div>
            </header>

            <!-- Grid für die Listen-Karten -->
            <section class="lists-grid">
                
                <!-- Karte 1 -->
                <article class="list-card">
                    <div class="card-header">
                        <span class="device-badge">MacBook Pro</span>
                        <button class="btn-delete" title="In den Papierkorb verschieben">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <h3 class="card-title">Setup Büro</h3>
                    <ul class="task-list">
                        <li><input type="checkbox" id="t1"> <label for="t1">Monitor kalibrieren</label></li>
                        <li><input type="checkbox" id="t2"> <label for="t2">Backup erstellen</label></li>
                        <li><input type="checkbox" id="t3"> <label for="t3">Kabel sortieren</label></li>
                    </ul>
                </article>

                <!-- Karte 2 -->
                <article class="list-card">
                    <div class="card-header">
                        <span class="device-badge">iPhone 15</span>
                        <button class="btn-delete" title="In den Papierkorb verschieben">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <h3 class="card-title">Reise-Apps</h3>
                    <ul class="task-list">
                        <li><input type="checkbox" id="t4"> <label for="t4">Offline-Karten laden</label></li>
                        <li><input type="checkbox" id="t5"> <label for="t5">Tickets in Wallet speichern</label></li>
                    </ul>
                </article>

                <!-- Leere Karte zum schnellen Erstellen (UX Best Practice) -->
                <button class="create-card">
                    <span class="plus-icon">+</span>
                    <span>Neue Liste hinzufügen</span>
                </button>

            </section>
        </main>

    </div>

</body>
</html>
